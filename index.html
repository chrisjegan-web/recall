ل معًا.", "tr": "Aynı kromozomda birbirine yakın olup birlikte aktarılan genler.", "vi": "Các gen nằm gần nhau trên cùng nhiễm sắc thể và di truyền cùng nhau.", "prs": "ژن‌هایی که روی یک کروموزوم نزدیک هم‌اند و با هم منتقل می‌شوند."}}, {"term": "Effect of linkage on ratios", "def": "Linked genes do not assort independently, so the expected 9:3:3:1 dihybrid ratio is altered.", "cid": "dihybrid-crosses-linkage-8b-06", "simple": "Linked genes don't sort separately, so the usual 9:3:3:1 changes.", "tr": {"ar": "الجينات المرتبطة لا تُوزَّع بشكل مستقلّ، فتتغيّر نسبة 9:3:3:1 المعتادة.", "tr": "Bağlı genler bağımsız dağılmaz, bu yüzden olağan 9:3:3:1 oranı değişir.", "vi": "Các gen liên kết không phân li độc lập, nên tỉ lệ 9:3:3:1 thường thay đổi.", "prs": "ژن‌های پیوسته مستقل توزیع نمی‌شوند، پس نسبت معمول ۹:۳:۳:۱ تغییر می‌کند."}}, {"term": "Crossing over and linked genes", "def": "Crossing over can separate linked genes, producing recombinant gametes.", "cid": "dihybrid-crosses-linkage-8b-07", "simple": "Swapping pieces can split linked genes apart, making new mixes.", "tr": {"ar": "تبادل القطع قد يفصل الجينات المرتبطة، فينشئ خلطات جديدة.", "tr": "Parça değişimi bağlı genleri ayırabilir ve yeni karışımlar oluşturabilir.", "vi": "Trao đổi đoạn có thể tách các gen liên kết, tạo ra tổ hợp mới.", "prs": "مبادلهٔ قطعه‌ها می‌تواند ژن‌های پیوسته را جدا کند و ترکیب‌های تازه بسازد."}}], "chapter": "8B", "order": 1, "sid": "dihybrid-crosses-linkage-8b"}, {"name": "Pedigree Analysis (8C)", "cards": [{"term": "Pedigree", "def": "A diagram showing how a trait is inherited through the generations of a family.", "cid": "pedigree-analysis-8c-01", "simple": "A family tree that shows how a trait passes down the generations.", "syll": "Ped·i·gree", "tr": {"ar": "شجرة عائلة تُظهر كيف تنتقل صفة عبر الأجيال.", "tr": "Bir özelliğin nesiller boyunca nasıl aktarıldığını gösteren bir soy ağacı.", "vi": "Một sơ đồ phả hệ cho thấy một tính trạng truyền qua các thế hệ như thế nào.", "prs": "یک شجره‌نامه که نشان می‌دهد یک صفت چگونه از نسلی به نسل دیگر منتقل می‌شود."}}, {"term": "Identify these pedigree symbols", "def": "Square = male, circle = female, fully shaded = affected, half-shaded = carrier; a horizontal line between two symbols is a mating line.", "timg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 230 130\">\n<rect x=\"20\" y=\"25\" width=\"26\" height=\"26\" fill=\"#fff\" stroke=\"#19251f\" stroke-width=\"2\"/>\n<text x=\"33\" y=\"68\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"10\" fill=\"#6c7d74\">male<\/text>\n<circle cx=\"85\" cy=\"38\" r=\"14\" fill=\"#fff\" stroke=\"#19251f\" stroke-width=\"2\"/>\n<text x=\"85\" y=\"68\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"10\" fill=\"#6c7d74\">female<\/text>\n<rect x=\"123\" y=\"25\" width=\"26\" height=\"26\" fill=\"#19251f\" stroke=\"#19251f\" stroke-width=\"2\"/>\n<text x=\"136\" y=\"68\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"10\" fill=\"#6c7d74\">affected<\/text>\n<circle cx=\"195\" cy=\"38\" r=\"14\" fill=\"#fff\" stroke=\"#19251f\" stroke-width=\"2\"/>\n<path d=\"M195 24 A14 14 0 0 1 195 52 Z\" fill=\"#19251f\"/>\n<text x=\"195\" y=\"68\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"10\" fill=\"#6c7d74\">carrier<\/text>\n<g stroke=\"#1f6f54\" stroke-width=\"2\"><line x1=\"46\" y1=\"95\" x2=\"78\" y2=\"95\"/><line x1=\"62\" y1=\"95\" x2=\"62\" y2=\"112\"/><\/g>\n<rect x=\"49\" y=\"82\" width=\"20\" height=\"20\" fill=\"#fff\" stroke=\"#19251f\" stroke-width=\"2\"/>\n<circle cx=\"95\" cy=\"92\" r=\"11\" fill=\"#fff\" stroke=\"#19251f\" stroke-width=\"2\"/>\n<text x=\"150\" y=\"98\" font-family=\"Inter,sans-serif\" font-size=\"10\" fill=\"#6c7d74\">— mating line<\/text>\n<\/svg>", "cid": "pedigree-analysis-8c-02", "simple": "Square = male, circle = female, filled = has the trait, half-filled = carrier. A line between two = a couple.", "tr": {"ar": "مربّع = ذكر، دائرة = أنثى، مملوء = مصاب، نصف مملوء = حامل. خط بين اثنين = زوجان.", "tr": "Kare = erkek, daire = kadın, dolu = etkilenmiş, yarı dolu = taşıyıcı. İki kişi arasındaki çizgi = bir çift.", "vi": "Hình vuông = nam, hình tròn = nữ, tô đầy = mắc bệnh, tô nửa = người mang. Đường nối hai người = một cặp.", "prs": "مربع = مرد، دایره = زن، پُر = مبتلا، نیمه‌پُر = ناقل. خط میان دو نفر = یک زوج."}}, {"term": "Mating and offspring lines", "def": "A horizontal line links two parents; vertical lines drop down to connect them to their children.", "cid": "pedigree-analysis-8c-03", "simple": "A line joins the parents; lines drop down to their children.", "tr": {"ar": "خط يصل بين الوالدين؛ وخطوط تنزل إلى أبنائهما.", "tr": "Bir çizgi ebeveynleri birleştirir; çizgiler aşağıya çocuklarına iner.", "vi": "Một đường nối hai bố mẹ; các đường kéo xuống nối với con của họ.", "prs": "خطی والدین را به هم وصل می‌کند؛ خط‌هایی به‌سمت پایین به فرزندان آن‌ها می‌رود."}}, {"term": "Autosomal recessive pattern", "def": "The trait can skip generations; two unaffected parents can have an affected child; males and females are affected equally.", "cid": "pedigree-analysis-8c-04", "simple": "Can skip generations. Two unaffected parents can have an affected child. Males and females equally.", "tr": {"ar": "قد تتخطّى أجيالًا. والدان غير مصابين قد يُنجبان طفلًا مصابًا. يصيب الذكور والإناث بالتساوي.", "tr": "Nesilleri atlayabilir. Etkilenmemiş iki ebeveynin etkilenmiş çocuğu olabilir. Erkek ve kadını eşit etkiler.", "vi": "Có thể bỏ qua các thế hệ. Hai bố mẹ không mắc bệnh vẫn có thể sinh con mắc bệnh. Ảnh hưởng nam và nữ như nhau.", "prs": "می‌تواند نسل‌ها را رد کند. دو والد سالم می‌توانند فرزند مبتلا داشته باشند. مردان و زنان را به‌یک‌اندازه درگیر می‌کند."}}, {"term": "Autosomal dominant pattern", "def": "The trait appears in every generation; an affected child always has at least one affected parent.", "cid": "pedigree-analysis-8c-05", "simple": "Shows in every generation. An affected child has at least one affected parent.", "tr": {"ar": "تظهر في كل جيل. الطفل المصاب له والد مصاب واحد على الأقلّ.", "tr": "Her nesilde görülür. Etkilenmiş bir çocuğun en az bir etkilenmiş ebeveyni vardır.", "vi": "Xuất hiện ở mọi thế hệ. Con mắc bệnh có ít nhất một bố hoặc mẹ mắc bệnh.", "prs": "در هر نسل دیده می‌شود. فرزند مبتلا دست‌کم یک والد مبتلا دارد."}}, {"term": "X-linked recessive pattern", "def": "More males are affected; the trait is often passed through carrier mothers; there is no male-to-male transmission.", "cid": "pedigree-analysis-8c-06", "simple": "More males affected. Often passed by carrier mothers. Never father to son.", "tr": {"ar": "إصابة الذكور أكثر. غالبًا تنتقل عبر أمّهات حاملات. لا تنتقل من الأب إلى الابن أبدًا.", "tr": "Daha çok erkek etkilenir. Çoğunlukla taşıyıcı annelerden geçer. Asla babadan oğula geçmez.", "vi": "Nam mắc nhiều hơn. Thường truyền qua người mẹ mang gen. Không bao giờ truyền từ cha sang con trai.", "prs": "مردان بیشتر مبتلا می‌شوند. اغلب از مادران ناقل منتقل می‌شود. هرگز از پدر به پسر نمی‌رسد."}}, {"term": "Consanguinity", "def": "Mating between close relatives, shown on a pedigree by a double horizontal line.", "cid": "pedigree-analysis-8c-07", "simple": "When close relatives have children together. Shown by a double line.", "parts": [{"p": "con", "m": "together"}, {"p": "sanguin", "m": "blood"}, {"p": "ity", "m": "state of"}], "syll": "Con·san·guin·i·ty", "tr": {"ar": "حين يُنجب أقارب من الدرجة القريبة أطفالًا معًا. يُرمز إليه بخط مزدوج.", "tr": "Yakın akrabaların birlikte çocuk sahibi olması. Çift çizgiyle gösterilir.", "vi": "Khi những người họ hàng gần có con với nhau. Được thể hiện bằng đường đôi.", "prs": "زمانی که خویشاوندان نزدیک با هم فرزند داشته باشند. با خط دوتایی نشان داده می‌شود."}}, {"term": "Using a pedigree for probability", "def": "Work out the parents' likely genotypes from the pattern, then use a Punnett square to predict the chance for future offspring.", "cid": "pedigree-analysis-8c-08", "simple": "Work out the parents' alleles from the pattern, then use a Punnett square to predict the next child.", "tr": {"ar": "استنتج أليلات الوالدين من النمط، ثم استخدم مربّع بانيت للتنبّؤ بالطفل التالي.", "tr": "Kalıptan ebeveynlerin alellerini çıkar, sonra sonraki çocuğu tahmin etmek için Punnett tablosu kullan.", "vi": "Suy ra alen của bố mẹ từ sơ đồ, rồi dùng bảng Punnett để dự đoán đứa con tiếp theo.", "prs": "از الگو اَلِل‌های والدین را به‌دست آور، سپس با جدول پانت فرزند بعدی را پیش‌بینی کن."}}], "chapter": "8C", "order": 1, "sid": "pedigree-analysis-8c"}, {"name": "Independent Assortment & Crossing Over (9A)", "cards": [{"term": "Independent assortment", "def": "The random orientation and separation of each homologous pair at metaphase/anaphase I, producing varied gamete combinations.", "cid": "independent-assortment-cross-01", "simple": "Chromosome pairs line up in random order in meiosis, so sex cells get mixed combinations.", "tr": {"ar": "تصطفّ أزواج الكروموسومات بترتيب عشوائي في الانقسام المنصّف، فتحصل الخلايا الجنسية على توليفات مختلطة.", "tr": "Mayozda kromozom çiftleri rastgele sırayla dizilir, böylece eşey hücreleri karışık kombinasyonlar alır.", "vi": "Trong giảm phân, các cặp nhiễm sắc thể xếp theo thứ tự ngẫu nhiên, nên tế bào sinh dục nhận các tổ hợp pha trộn.", "prs": "در میوز جفت‌های کروموزوم به ترتیب تصادفی ردیف می‌شوند، پس سلول‌های جنسی ترکیب‌های گوناگون می‌گیرند."}}, {"term": "Chromosomal basis of independent assortment", "def": "Each homologous pair lines up independently of the others at the cell equator during metaphase I.", "cid": "independent-assortment-cross-02", "simple": "Each pair lines up on its own, separate from the other pairs.", "tr": {"ar": "يصطفّ كل زوج بمفرده، مستقلًّا عن بقية الأزواج.", "tr": "Her çift, diğer çiftlerden bağımsız olarak kendi başına dizilir.", "vi": "Mỗi cặp xếp hàng riêng, độc lập với các cặp khác.", "prs": "هر جفت به‌تنهایی و مستقل از جفت‌های دیگر ردیف می‌شود."}}, {"term": "Combinations from independent assortment in humans", "def": "2^23 (over 8 million) possible chromosome combinations per gamete, from independent assortment alone.", "cid": "independent-assortment-cross-03", "simple": "Over 8 million (2 to the power 23) possible mixes per sex cell.", "tr": {"ar": "أكثر من 8 ملايين (2 أس 23) توليفة ممكنة لكل خلية جنسية.", "tr": "Her eşey hücresi için 8 milyondan fazla (2 üzeri 23) olası karışım.", "vi": "Hơn 8 triệu (2 mũ 23) tổ hợp có thể có cho mỗi tế bào sinh dục.", "prs": "بیش از ۸ میلیون (۲ به توان ۲۳) ترکیب ممکن برای هر سلول جنسی."}}, {"term": "Crossing over", "def": "The exchange of segments between homologous chromosomes during prophase I of meiosis.", "cid": "independent-assortment-cross-04", "simple": "Matching chromosomes swap pieces, making new mixes of genes.", "tr": {"ar": "تتبادل الكروموسومات المتماثلة القطع، فتنشأ خلطات جديدة من الجينات.", "tr": "Eşleşen kromozomlar parça değiş tokuş ederek yeni gen karışımları oluşturur.", "vi": "Các nhiễm sắc thể tương đồng trao đổi đoạn, tạo ra tổ hợp gen mới.", "prs": "کروموزوم‌های همتا قطعه‌ها را مبادله می‌کنند و ترکیب‌های ژنی تازه می‌سازند."}, "timg": "data:image/webp;base64,UklGRoQ6AABXRUJQVlA4IHg6AADQBgGdASqEA7gBPm02mEikIyKhIrF5eIANiWdu/HA5q+jM5/yf9N3Rdb8235Rfxb30eqfqF6LsS668obn/0l+gv/m+oB/0fTt6C/MB+tfql/8b9tfcb+0XsAfzL+kf//2b/+H///ca/tv/U///uFfu360Hqs/5X0vPQA///t09NP0a/s/5E+8/uw+oflN/XvSv8V+Zfun9b/wX+d/uHtd5M/M/2n/h/3j1H/j/1x/Kf3H91/7l82P1D/If378g/2A9pffN/S/3D2BfyH+af5j+4/t/+dHuc/zn5IeEdq/+M/z/qBevv0v/W/4b90/856M/+L/cvUL8m/qv+s+6P7AP5N/Wf+B9zXx1/p/Bh+9f7j9lfgD/oH9z/73+V/NH6Wf5r/y/6n8wvbL+g/5b/wf6L8s/sH/mf9n/6H+C/z37RfPd7Hv3X///u6/t///xQaaw0cEzov0RFwpM6L9ERcKTOi/REXCkzov0RFwoSiICweH5jg4rba1TGoiZgqB31tZSBelNtkmjGkAdKQtRXfXM77lGopNAtb89QmxZuDJ6B9+CJWwpKXUB+zN1Rskk0TAgVGpKcmW+k9X0vW6CW5hJq4O9kRrrlfWxJPCGCY9I6O+SaydIpz2kNXWWbLmNRFiuS9idwNaJvx8qZMQaADAy7E5qDA4khjNlZ/N3tGuoPTXG/dIvKUEh7G97SSzLPICKCGCU/99vXXZSAxRntY5vygdgm8anr9S9et/gWZygVakkeDoUnMZ9c+t9KeNG9xW2wi0KD4IPo0Lxd6OdUN4i9h1tAlmDkpoanjw0A+7KCwjjbuSDDy9At4B0hdYkacHfEolmIeFBKeuULHN6gs+u45GU9Y0gIrfivq63Qd00Vjr6OgMFnDt ation", "m": "mixing"}], "tr": {"ar": "خلطات جديدة من الأليلات تنشأ بالعبور والتوزيع العشوائي.", "tr": "Krossing over ve rastgele dağılımla oluşan yeni alel karışımları.", "vi": "Các tổ hợp alen mới được tạo ra do trao đổi chéo và phân li ngẫu nhiên.", "prs": "ترکیب‌های تازهٔ اَلِل‌ها که با کراسینگ‌اور و توزیع تصادفی ساخته می‌شوند."}}, {"term": "Recombination frequency", "def": "The proportion of offspring that are recombinant; used to estimate the distance between two genes on a chromosome.", "cid": "independent-assortment-cross-07", "simple": "How often offspring have a new mix. Used to measure how far apart two genes are.", "tr": {"ar": "مدى تكرار حصول النسل على خلطة جديدة. يُستخدَم لقياس المسافة بين جينين.", "tr": "Yavruların ne sıklıkla yeni karışım taşıdığı. İki genin ne kadar uzak olduğunu ölçmek için kullanılır.", "vi": "Tần suất đời con có tổ hợp mới. Dùng để đo hai gen cách nhau bao xa.", "prs": "اینکه فرزندان چند بار ترکیب تازه دارند. برای سنجش فاصلهٔ دو ژن به کار می‌رود."}}, {"term": "Recombination frequency and gene distance", "def": "Genes that are further apart on a chromosome have a higher recombination frequency.", "cid": "independent-assortment-cross-08", "simple": "Genes further apart swap more often, so they have a higher recombination frequency.", "tr": {"ar": "الجينات الأبعد تتبادل أكثر، فيكون تردّد إعادة التركيب فيها أعلى.", "tr": "Daha uzaktaki genler daha sık yer değiştirir, bu yüzden rekombinasyon sıklıkları daha yüksektir.", "vi": "Các gen càng xa nhau càng trao đổi nhiều, nên tần suất tái tổ hợp cao hơn.", "prs": "ژن‌هایی که دورتر هستند بیشتر جابه‌جا می‌شوند، پس فراوانی نوترکیبی بالاتری دارند."}}], "chapter": "9A", "order": 1, "sid": "independent-assortment-cross"}, {"name": "Genetic Variation & Sexual Reproduction (9A)", "cards": [{"term": "Three sources of genetic variation", "def": "Crossing over, independent assortment, and random fertilisation.", "cid": "genetic-variation-sexual-rep-01", "simple": "Crossing over, random sorting of ch ": {"ar": "إنتاج خلايا جذعية أو أنسجة للعلاج الطبّي، لا كائن كامل.", "tr": "Tüm bir organizma değil, tıbbi tedavi için kök hücre veya doku üretmek.", "vi": "Tạo tế bào gốc hoặc mô để điều trị y tế, không phải cả một sinh vật.", "prs": "ساختن سلول‌های بنیادی یا بافت برای درمان پزشکی، نه یک موجود کامل."}}, {"term": "Natural cloning examples", "def": "Identical twins, bacteria dividing by binary fission, and plants spreading by runners or cuttings.", "cid": "cloning-9b-05", "simple": "Identical twins, bacteria splitting in two, and plants growing from runners or cuttings.", "tr": {"ar": "التوائم المتطابقة، وانقسام البكتيريا إلى اثنتين، ونمو النباتات من المدّادات أو العُقَل.", "tr": "Tek yumurta ikizleri, ikiye bölünen bakteriler ve sürgün ya da çeliklerden büyüyen bitkiler.", "vi": "Sinh đôi cùng trứng, vi khuẩn phân đôi, và cây mọc từ thân bò hoặc giâm cành.", "prs": "دوقلوهای همسان، تقسیم باکتری به دو، و رویش گیاهان از ساقه‌های خزنده یا قلمه."}}, {"term": "Issues with cloning", "def": "Ethical concerns, low success rates, health problems and premature ageing in clones, and reduced genetic diversity.", "cid": "cloning-9b-06", "simple": "Ethical worries, often fails, clones can be unhealthy, and less genetic variety.", "tr": {"ar": "مخاوف أخلاقية، وكثرة الإخفاق، واحتمال اعتلال صحّة المستنسخات، وقلّة التنوّع الوراثي.", "tr": "Etik kaygılar, sık başarısızlık, klonların sağlıksız olabilmesi ve daha az genetik çeşitlilik.", "vi": "Lo ngại đạo đức, thường thất bại, các bản sao có thể không khỏe mạnh, và ít đa dạng di truyền.", "prs": "نگرانی‌های اخلاقی، شکست مکرر، احتمال ناسالم‌بودن کلون‌ها، و تنوع ژنتیکی کمتر."}}], "chapter": "9B", "order": 1, "sid": "cloning-9b"}], "chapters": [{"code": "DNA", "title": "DNA structure"}, {"code": "7A", "title": "Chromosomes, genes & alleles"}, {"code": "7B", "title": "Meiosis & gametes"}, {"code": "7C", "title": "Variations in inheritance"}, {"code": "7D", "title": "Nature, nurture & epigenetics"}, {"code": "8A", "title": "Monohybrid crosses"}, {"code": "8B", "title": "Dihybrid crosses & linkage"}, {"code": "8C", "title": "Pedigree analysis"}, {"code": "9A", "title": "Variation & assortment"}, {"code": "9B", "title": "Cloning"}]}</script>

<script>
/* =========================================================================
   Recall — a single-file, offline-first study-card app (Leitner SRS)
   Storage: IndexedDB (sets, images, progress) — local-first.
   Sync:    anonymous code. Firebase-ready (paste config below) with a
            zero-backend copy/paste fallback that works today.
   ========================================================================= */

/* ----- 1. FIREBASE CONFIG (paste yours here to switch on live sync) ----- */
const FIREBASE_CONFIG = null;
/*  Example — replace null with your project's web config object:
const FIREBASE_CONFIG = {
  apiKey:"...", authDomain:"...", projectId:"...",
  storageBucket:"...", messagingSenderId:"...", appId:"..."
};
   When this is filled in, the sync code becomes true cross-device sync.
   While it's null, the app uses copy/paste transfer (still anonymous).      */

/* ----- 2. Leitner schedule: days until a card is due again, per box ----- */
const BOX_DAYS = [0, 1, 3, 7, 16];          // box 1..5 → due in N days
const BOX_LABELS = ['New','Seen','Getting it','Strong','Mastered'];
const SESSION_CAP = 24;                       // max cards per learn session
const DAY = 86400000;

/* ----- 3. tiny IndexedDB wrapper ----- */
const DB = (()=>{ let db;
  function open(){ return new Promise((res,rej)=>{
    const r = indexedDB.open('recall-db',1);
    r.onupgradeneeded = e=>{ const d=e.target.result;
      if(!d.objectStoreNames.contains('sets')) d.createObjectStore('sets',{keyPath:'id'});
      if(!d.objectStoreNames.contains('images')) d.createObjectStore('images');
      if(!d.objectStoreNames.contains('progress')) d.createObjectStore('progress',{keyPath:'setId'});
      if(!d.objectStoreNames.contains('meta')) d.createObjectStore('meta');
    };
    r.onsuccess=()=>{db=r.result;res(db)}; r.onerror=()=>rej(r.error);
  });}
  function tx(store,mode){ return db.transaction(store,mode).objectStore(store); }
  function p(req){ return new Promise((res,rej)=>{req.onsuccess=()=>res(req.result);req.onerror=()=>rej(req.error)}); }
  return {
    init:open,
    getAll:s=>p(tx(s,'readonly').getAll()),
    get:(s,k)=>p(tx(s,'readonly').get(k)),
    put:(s,v,k)=>p(tx(s,'readwrite').put(v,k)),
    del:(s,k)=>p(tx(s,'readwrite').delete(k)),
  };
})();

/* ----- 4. state ----- */
let SETS=[], PROGRESS={}, META={}, current=null, SEED=null;
/* Teacher mode unlocks authoring of the curated decks + web images.
   Off by default: students get a clean, study-only view and can only build
   and edit THEIR OWN sets. Long-press the “Recall.” title to enter the code.
   CHANGE THIS PASSCODE before you deploy: */
const TEACHER_PASSCODE = 'hcsc-bio';
let TEACHER = false;
function isCurated(set){ return !!(set && set._managed); }     // bundled biology decks
function canEdit(set){ return TEACHER || !isCurated(set); }    // students: own sets only
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const uid=()=>Math.random().toString(36).slice(2,9);
const today=()=> Math.floor(Date.now()/DAY);   // integer day index
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }

/* image helpers: stored as Blob in IndexedDB, shown via object URL (cached) */
const urlCache={};
async function imgURL(key){ if(!key) return null; if(urlCache[key]) return urlCache[key];
  const blob=await DB.get('images',key); if(!blob) return null;
  return urlCache[key]=URL.createObjectURL(blob); }
function fileToBlob(file){ return file; }   // File is already a Blob

/* ----- 5. progress model ----- */
function setProgress(setId){ if(!PROGRESS[setId]) PROGRESS[setId]={setId,cards:{}}; return PROGRESS[setId]; }
function cardState(setId,cardId){ const p=setProgress(setId); if(!p.cards[cardId]) p.cards[cardId]={box:1,due:today()}; return p.cards[cardId]; }
async function saveProgress(setId){ await DB.put('progress', PROGRESS[setId]); queueSync(); }
function grade(setId,cardId,correct){ const st=cardState(setId,cardId);
  st.box = correct ? Math.min(5, st.box+1) : 1;
  st.due = today() + BOX_DAYS[st.box-1];
}
function dueCards(set){ const t=today(); return set.cards.filter(c=>{ const st=cardState(set.id,c.id); return st.due<=t; }); }
function boxCounts(set){ const c=[0,0,0,0,0]; set.cards.forEach(card=>{ c[cardState(set.id,card.id).box-1]++; }); return c; }
/* mastery = average progress across the 5 stages (all New = 0%, all Mastered = 100%) */
function masteryPct(set){ if(!set.cards.length) return 0; let s=0; set.cards.forEach(c=>{ s+=(cardState(set.id,c.id).box-1)/4; }); return Math.round(s/set.cards.length*100); }
function scopeBoxCounts(scope){ const c=[0,0,0,0,0]; scope.sets.forEach(s=>s.cards.forEach(card=>{ c[cardState(s.id,card.id).box-1]++; })); return c; }
function scopeTotal(scope){ return scope.sets.reduce((n,s)=>n+s.cards.length,0); }
function scopeMastery(scope){ const t=scopeTotal(scope); if(!t) return 0; let s=0; scope.sets.forEach(set=>set.cards.forEach(c=>{ s+=(cardState(set.id,c.id).box-1)/4; })); return Math.round(s/t*100); }

/* ----- 5b. daily rhythm: a gentle, forgiving streak --------------------------
   Rewards opening the app, never punishes staying away. No notifications.
   A single missed day never breaks a run (one rest day is bridged, and shown
   on the strip so the count stays honest). The weekly strip is the calm anchor
   and starts fresh every Monday. The default goal is small so a low-energy day
   still counts, and meeting it gives explicit permission to stop. All local. */
const DEFAULT_GOAL=10, MILESTONES=[3,7,14,30,50,100];
// local-midnight day index, so the day doesn't roll over mid-morning in UTC+10/+11
function localDay(){ const n=new Date(); return Math.floor((n.getTime()-n.getTimezoneOffset()*60000)/DAY); }
function activeDays(){ return META.activeDays||(META.activeDays=[]); }
function isActive(d){ return activeDays().includes(d); }
function computeStreak(){            // consecutive active days ending today/yesterday, bridging one rest day
  const set=new Set(activeDays()), t=localDay();
  let d = set.has(t) ? t : (set.has(t-1) ? t-1 : null);
  if(d===null) return 0;
  let cur=1;
  while(true){ if(set.has(d-1)){ d-=1; cur++; } else if(set.has(d-2)){ d-=2; cur++; } else break; }
  return cur;
}
function isRestBridged(d){ const s=new Set(activeDays()); return !s.has(d)&&s.has(d-1)&&s.has(d+1); }

/* The goal is the student's own intention, not a forced number.
   type 'count' = N reviews · 'scope' = finish a chosen set/chapter today
   (faithfully — those specific cards) · 'min' = just show up (1 card). */
function currentGoal(){ return META.goal || {type:'count', n:DEFAULT_GOAL}; }
function keyFor(c){ return (c._sid||sidOf(c))+':'+c.id; }
function scopeCardKeys(g){
  let sets=[];
  if(g.scopeKind==='set') sets=SETS.filter(s=>s.id===g.scopeId);
  else if(g.scopeKind==='chapter') sets=SETS.filter(s=>s.chapter===g.scopeId);
  const ks=[]; sets.forEach(s=>s.cards.forEach(c=>ks.push(s.id+':'+c.id))); return ks;
}
function goalTarget(g){ if(g.type==='min') return 1; if(g.type==='count') return g.n; return scopeCardKeys(g).length; }
function goalProgress(dp,g){ if(!dp) return 0;
  if(g.type==='scope'){ const ks=new Set(scopeCardKeys(g)); return (dp.seen||[]).filter(k=>ks.has(k)).length; }
  if(g.type==='min') return Math.min(dp.n||0,1);
  return dp.n||0;
}
function goalMet(dp,g){ const t=goalTarget(g); return t>0 && goalProgress(dp,g)>=t; }
function goalChipLabel(g){
  if(g.type==='min') return 'Show up';
  if(g.type==='count') return `Goal ${g.n}`;
  return `Goal: ${g.short||g.label||'set'}`;
}

async function recordReview(key){       // called once per active-recall card (Learn + Test)
  const t=localDay(); let dp=META.dayProgress;
  if(!dp || dp.d!==t) dp={d:t,n:0,seen:[]};
  if(!dp.seen) dp.seen=[];
  dp.n++; if(key && !dp.seen.includes(key)) dp.seen.push(key);
  META.dayProgress=dp; await DB.put('meta',dp,'dayProgress');
  if(goalMet(dp,currentGoal()) && !isActive(t)) await markDayActive(t);
  else renderStreak();
}
async function markDayActive(t){
  if(!isActive(t)){ activeDays().push(t); activeDays().sort((a,b)=>a-b);
    if(activeDays().length>120) META.activeDays=activeDays().slice(-120);
    await DB.put('meta',META.activeDays,'activeDays'); queueSync(); }
  const run=computeStreak(), seen=META.streakSeen||(META.streakSeen=[]);
  if(MILESTONES.includes(run) && !seen.includes(run)){
    seen.push(run); await DB.put('meta',META.streakSeen,'streakSeen');
    toast(`${run}-day run — lovely consistency 🌿`);
  } else toast('Goal reached for today — nice work');
  renderStreak();
}
function leafSvg(){ return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 21c0-7 5-13 14-14 0 9-5 14-14 14zm0 0c2-4 5-6 9-7" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round"/></svg>'; }
function tickSvg(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>'; }

function renderStreak(){
  const el=$('#streak'); if(!el) return;
  const t=localDay(), run=computeStreak(), doneToday=isActive(t), g=currentGoal();
  const dp=(META.dayProgress&&META.dayProgress.d===t)?META.dayProgress:null;
  const prog=goalProgress(dp,g), target=goalTarget(g);
  const dow=(new Date(t*DAY).getUTCDay()+6)%7, weekStart=t-dow;   // Monday-first
  const labels=['M','T','W','T','F','S','S']; let strip='';
  for(let i=0;i<7;i++){ const d=weekStart+i, cls=[];
    if(d===t)cls.push('today'); if(d>t)cls.push('future');
    if(isActive(d))cls.push('studied'); else if(isRestBridged(d))cls.push('rest');
    const inner=isActive(d)?tickSvg():(isRestBridged(d)?'·':'');
    strip+=`<div class="wd ${cls.join(' ')}"><span class="dl">${labels[i]}</span><span class="dot">${inner}</span></div>`;
  }
  const head = run>0 ? `${run}-day run` : 'New run starts today 🌱';
  let sub;
  if(doneToday) sub='Done for today — more is welcome, but you’ve earned a rest.';
  else if(g.type==='min') sub='Just show up — one card keeps the run going';
  else if(g.type==='scope') sub=`${g.label}: ${prog} of ${target} cards today`;
  else sub=`${prog} of ${target} cards today${run>0?' · keep it gentle':' to begin'}`;
  el.innerHTML=`
    <div class="streak-top">
      <div class="streak-flame ${(run>0||doneToday)?'':'rest'}">${leafSvg()}</div>
      <div class="streak-main">
        <div class="streak-head">${head}</div>
        <div class="streak-sub">${sub}</div>
      </div>
      <button class="streak-goal ${doneToday?'done':''}" id="goal-set" aria-label="Set your goal for today">${doneToday?'✓ today':esc(goalChipLabel(g))}</button>
    </div>
    <div class="week">${strip}</div>`;
  $('#goal-set').onclick=openGoalPicker;
}

/* Student sets their own intention: a number, a set/chapter to finish, or just show up. */
async function setGoal(g){
  META.goal=g; await DB.put('meta',g,'goal');
  const t=localDay(), dp=(META.dayProgress&&META.dayProgress.d===t)?META.dayProgress:null;
  if(goalMet(dp,g) && !isActive(t)) await markDayActive(t); else renderStreak();
}
function openGoalPicker(){
  const g=currentGoal();
  const chapters=(SEED&&SEED.chapters)?SEED.chapters:[];
  const groups=[];
  chapters.forEach(ch=>{ const sets=SETS.filter(s=>s.chapter===ch.code).sort((a,b)=>(a.order||0)-(b.order||0)); if(sets.length) groups.push({code:ch.code,title:ch.title,sets}); });
  const others=SETS.filter(s=>!s.chapter||!chapters.some(c=>c.code===s.chapter));
  if(others.length) groups.push({code:'__other',title:'Your own sets',sets:others});
  const numOn=n=>g.type==='count'&&g.n===n?'on':'';
  let scopeRows='';
  for(const gr of groups){
    const csize=gr.sets.reduce((n,s)=>n+s.cards.length,0);
    const on = g.type==='scope'&&g.scopeKind==='chapter'&&g.scopeId===gr.code?'on':'';
    if(gr.sets.length>1) scopeRows+=`<button class="sheet-opt ${on}" data-scope="chapter" data-id="${esc(gr.code)}" data-label="${esc(gr.title)}" data-short="${esc(gr.code==='__other'?'sets':gr.code)}">Finish ${esc(gr.title)}<em>${csize} cards</em></button>`;
    for(const s of gr.sets){ const son=g.type==='scope'&&g.scopeKind==='set'&&g.scopeId===s.id?'on':'';
      scopeRows+=`<button class="sheet-opt sub ${son}" data-scope="set" data-id="${esc(s.id)}" data-label="${esc(s.name)}" data-short="${esc(s.name)}">${esc(s.name)}<em>${s.cards.length} cards</em></button>`; }
  }
  const sheet=document.createElement('div'); sheet.className='sheet';
  sheet.innerHTML=`<div class="sheet-card goal-sheet">
    <div class="sheet-h">Set your goal for today</div>
    <div class="goal-nums">
      ${[5,10,15,20].map(n=>`<button class="gnum ${numOn(n)}" data-num="${n}">${n}</button>`).join('')}
      <button class="gnum" data-num="custom">…</button>
    </div>
    <button class="sheet-opt ${g.type==='min'?'on':''}" data-min>Just show up<em>1 card</em></button>
    <div class="sheet-divide">Or finish something today</div>
    <div class="goal-scopes">${scopeRows}</div>
  </div>`;
  sheet.onclick=e=>{ if(e.target===sheet) sheet.remove(); };
  sheet.querySelectorAll('[data-num]').forEach(b=>b.onclick=async()=>{
    let n; if(b.dataset.num==='custom'){ const v=prompt('How many cards today?','12'); n=Math.max(1,Math.min(500,parseInt(v,10)||0)); if(!n) return; }
    else n=+b.dataset.num;
    sheet.remove(); await setGoal({type:'count',n});
  });
  sheet.querySelector('[data-min]').onclick=async()=>{ sheet.remove(); await setGoal({type:'min'}); };
  sheet.querySelectorAll('[data-scope]').forEach(b=>b.onclick=async()=>{
    sheet.remove();
    await setGoal({type:'scope',scopeKind:b.dataset.scope,scopeId:b.dataset.id,label:b.dataset.label,short:b.dataset.short});
  });
  document.body.appendChild(sheet);
}

/* ---- scope: a study session runs over one set OR a whole chapter ---- */
function scopeOf(set){ return {name:set.name, sets:[set]}; }
function scopeChapter(code){
  if(code==='__other'){
    const known=new Set((SEED&&SEED.chapters||[]).map(c=>c.code));
    return {name:'Your own sets', sets:SETS.filter(s=>!s.chapter||!known.has(s.chapter))};
  }
  const sets=SETS.filter(s=>s.chapter===code);
  const ch=(SEED&&SEED.chapters||[]).find(c=>c.code===code);
  return {name:ch?`${ch.code} · ${ch.title}`:code, sets};
}
/* flat list of cards, each invisibly tagged with its origin set id (_sid) */
function poolOf(scope){ const out=[]; scope.sets.forEach(s=>(s.cards||[]).forEach(c=>{
  try{ Object.defineProperty(c,'_sid',{value:s.id,enumerable:false,configurable:true,writable:true}); }catch(e){ c._sid=s.id; }
  out.push(c); })); return out; }
function scopeDue(scope){ const t=today(); return poolOf(scope).filter(c=>cardState(c._sid,c.id).due<=t); }
function sidOf(c){ return c._sid; }

/* ---- which side leads: 'term' shows term first, 'def' shows definition first,
        'mixed' randomises per card. Returns an array of booleans (def-is-prompt). */
function buildOrient(pool){ const d=META.dir||'term'; return pool.map(()=> d==='mixed' ? (Math.random()<0.5) : d==='def'); }
function sideOf(c,kind){ return kind==='term'
  ? {kind:'term',label:'Term',text:c.term,img:c.termImg}
  : {kind:'def', label:'Definition',text:c.def, img:c.defImg}; }

/* ---- audio (text-to-speech) + home-language support ---- */
const LANGS=[
  {code:'ar', name:'العربية', en:'Arabic',     rtl:true, voice:'ar'},
  {code:'tr', name:'Türkçe',  en:'Turkish',              voice:'tr'},
  {code:'vi', name:'Tiếng Việt', en:'Vietnamese',        voice:'vi'},
  {code:'prs',name:'دری',     en:'Dari',       rtl:true, voice:'fa'},
  {code:'syr',name:'ܣܘܪܝܝܐ',  en:'Assyrian',   rtl:true, voice:''}
];
function ttsOK(){ return typeof window!=='undefined' && 'speechSynthesis' in window; }
function speak(text,voiceLang){ if(!ttsOK()||!text) return;
  try{ window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.rate = META.slow?0.6:0.85;
    if(voiceLang) u.lang=voiceLang;
    window.speechSynthesis.speak(u);
  }catch(e){}
}
function stopSpeak(){ if(ttsOK()) try{ window.speechSynthesis.cancel(); }catch(e){} }
function langMeta(code){ return LANGS.find(l=>l.code===code); }

async function redrawFaces(){
  const c=sess.cards[sess.i], defFirst=sess.orient[sess.i];
  $('#front').innerHTML=await faceHTML(sideOf(c, defFirst?'def':'term'), c, true);
  $('#back').innerHTML =await faceHTML(sideOf(c, defFirst?'term':'def'), c, false);
  bindStar(); bindCardExtras();
}
function bindCardExtras(){
  $$('[data-speak]').forEach(b=>b.onclick=e=>{ e.stopPropagation();
    const c=sess.cards[sess.i], kind=b.dataset.speak;
    if(kind==='term'){ speak(c.term); return; }
    if(META.lang){ const L=langMeta(META.lang); if(c.tr&&c.tr[META.lang]&&L&&L.voice){ speak(c.tr[META.lang],L.voice); return; } }
    speak((META.simpleOn&&c.simple)?c.simple:c.def);
  });
  $$('[data-simpler]').forEach(b=>b.onclick=async e=>{ e.stopPropagation(); META.simpleOn=!META.simpleOn; await DB.put('meta',META.simpleOn,'simpleOn'); redrawFaces(); });
  $$('[data-parts]').forEach(b=>b.onclick=async e=>{ e.stopPropagation(); META.partsOn=!META.partsOn; await DB.put('meta',META.partsOn,'partsOn'); redrawFaces(); });
  $$('[data-lang]').forEach(b=>b.onclick=e=>{ e.stopPropagation(); openLangPicker(); });
}
function openLangPicker(){
  const c=sess.cards[sess.i];
  const avail=LANGS.filter(l=>c.tr&&c.tr[l.code]);
  const sheet=document.createElement('div'); sheet.className='sheet';
  sheet.innerHTML=`<div class="sheet-card">
    <div class="sheet-h">Show the meaning in…</div>
    <button class="sheet-opt ${!META.lang?'on':''}" data-pl="">English only</button>
    ${avail.map(l=>`<button class="sheet-opt ${META.lang===l.code?'on':''}" data-pl="${l.code}"><span ${l.rtl?'dir="rtl"':''}>${l.name}</span><em>${l.en}</em></button>`).join('')}
  </div>`;
  sheet.onclick=e=>{ if(e.target===sheet) sheet.remove(); };
  sheet.querySelectorAll('[data-pl]').forEach(b=>b.onclick=async()=>{ META.lang=b.dataset.pl||null; await DB.put('meta',META.lang,'lang'); sheet.remove(); redrawFaces(); });
  document.body.appendChild(sheet);
}

/* in-session control to switch which side leads; re-renders the current card live */
function dirControlHTML(){ const d=META.dir||'term'; return `
  <div class="sess-dir"><div class="seg dir-seg">
    <button data-dir="term" class="${d==='term'?'on':''}">Term</button>
    <button data-dir="def" class="${d==='def'?'on':''}">Definition</button>
    <button data-dir="mixed" class="${d==='mixed'?'on':''}">Mix</button>
  </div></div>`; }
function bindDirControl(){ $$('.sess-dir [data-dir]').forEach(b=>b.onclick=()=>sessionSetDir(b.dataset.dir)); }
async function sessionSetDir(d){
  META.dir=d; await DB.put('meta',d,'dir');
  for(let k=sess.i;k<sess.cards.length;k++){ sess.orient[k] = d==='mixed' ? (Math.random()<0.5) : (d==='def'); }
  $$('.sess-dir [data-dir]').forEach(x=>x.classList.toggle('on',x.dataset.dir===d));
  sess.flipped=false; $('#flip').classList.remove('flipped');
  if(sess.mode==='learn') drawLearn(); else drawFlip();
}

async function startFlip(scope){
  if(!scope.sets) scope=scopeOf(scope);
  const pool=poolOf(scope);
  if(!pool.length){ toast('This set has no cards yet'); return; }
  sess={scope,cards:[...pool],orient:buildOrient(pool),i:0,flipped:false,mode:'flip'};
  openSession(`
    <div class="sess-top">
      <button class="close" id="x">${xSvg()}</button>
      <div class="progbar"><i id="pb"></i></div>
      <div class="sess-count" id="cnt"></div>
    </div>
    ${dirControlHTML()}
    <div class="cardstage">
      <div class="flip" id="flip"><div class="flip-inner">
        <div class="face front" id="front"></div>
        <div class="face back" id="back"></div>
      </div></div>
    </div>
    <div class="sess-actions">
      <div class="nav-flip">
        <button class="arrow" id="prev">${chevron('l')}</button>
        <button class="flipbtn" id="flipbtn">Flip card</button>
        <button class="arrow" id="next">${chevron('r')}</button>
      </div>
    </div>`);
  $('#x').onclick=closeSession;
  bindDirControl();
  $('#flip').onclick=$('#flipbtn').onclick=()=>{ sess.flipped=!sess.flipped; $('#flip').classList.toggle('flipped',sess.flipped); };
  $('#prev').onclick=()=>moveFlip(-1); $('#next').onclick=()=>moveFlip(1);
  swipeBind($('#flip'),()=>moveFlip(1),()=>moveFlip(-1));
  await drawFlip();
}
function moveFlip(d){ const n=sess.i+d; if(n<0||n>=sess.cards.length) return; sess.i=n; sess.flipped=false; $('#flip').classList.remove('flipped'); drawFlip(); }
async function drawFlip(){
  const c=sess.cards[sess.i], defFirst=sess.orient[sess.i];
  $('#cnt').textContent=`${sess.i+1} / ${sess.cards.length}`;
  $('#pb').style.width=`${(sess.i+1)/sess.cards.length*100}%`;
  $('#front').innerHTML=await faceHTML(sideOf(c, defFirst?'def':'term'), c, true);
  $('#back').innerHTML =await faceHTML(sideOf(c, defFirst?'term':'def'), c, false);
  $('#prev').disabled=sess.i===0; $('#next').disabled=sess.i===sess.cards.length-1;
  bindStar(); bindCardExtras();
}
async function faceHTML(side,card,isFront){
  const src=await imgURL(side.img);
  const flag=isFront?`<button class="flag ${card.starred?'on':''}" data-star="${card.id}" aria-label="Flag this card to revisit">${flagSvg()}</button>`:'';
  const isDef=side.kind==='def', isTerm=side.kind==='term';
  const hasParts = card.syll || (card.parts && card.parts.length);
  let text=side.text;
  if(isDef && META.simpleOn && card.simple) text=card.simple;
  let extra='';
  if(isDef && META.lang && card.tr && card.tr[META.lang]){ const L=langMeta(META.lang);
    extra+=`<div class="def-tr" ${L&&L.rtl?'dir="rtl"':''}>${esc(card.tr[META.lang])}</div>`; }
  if(isTerm && META.partsOn && hasParts) extra+=partsPanel(card);
  const bar=[];
  if(ttsOK()) bar.push(`<button class="cbtn" data-speak="${side.kind}" aria-label="Hear it">${spkSvg()}</button>`);
  if(isTerm && hasParts) bar.push(`<button class="cbtn ${META.partsOn?'on':''}" data-parts aria-label="Break the word into parts">a·b</button>`);
  if(isDef && card.simple) bar.push(`<button class="cbtn ${META.simpleOn?'on':''}" data-simpler aria-label="Simpler English">Aa</button>`);
  if(isDef && card.tr && Object.keys(card.tr).length) bar.push(`<button class="cbtn ${META.lang?'on':''}" data-lang aria-label="Translate">${globeSvg()}</button>`);
  const barHTML=bar.length?`<div class="card-audio">${bar.join('')}</div>`:'';
  return `<div class="side-tag">${side.label}</div>${flag}
    ${src?`<img class="cardimg" src="${src}" alt="">`:''}
    <div class="${side.kind==='term'?'term':'def'}">${esc(text||'')}</div>
    ${extra}${barHTML}
    ${isFront?'<div class="tap-hint">tap to flip</div>':''}`;
}
function partsPanel(card){
  let h='';
  if(card.syll) h+=`<div class="syll">${esc(card.syll)}</div>`;
  if(card.parts && card.parts.length) h+=`<div class="morphs">${card.parts.map(p=>`<span class="morph"><b>${esc(p.p)}</b>${p.m?` — ${esc(p.m)}`:''}</span>`).join('')}</div>`;
  return h?`<div class="parts-panel">${h}</div>`:'';
}
function bindStar(){ $$('[data-star]').forEach(b=>b.onclick=async e=>{ e.stopPropagation();
  const id=b.dataset.star;
  for(const s of SETS){ const c=s.cards.find(x=>x.id===id); if(c){ c.starred=!c.starred; await DB.put('sets',s); b.classList.toggle('on',c.starred); toast(c.starred?'Flagged to revisit':'Flag removed'); break; } } }); }

/* =========================================================================
   STUDY MODE: Learn (Leitner)
   ========================================================================= */
async function startLearn(scope){
  if(!scope.sets) scope=scopeOf(scope);
  let pool=scopeDue(scope);
  if(!pool.length){
    pool=poolOf(scope).sort((a,b)=>cardState(sidOf(a),a.id).box-cardState(sidOf(b),b.id).box).slice(0,SESSION_CAP);
    if(!pool.length){ toast('Add some cards first'); return; }
    toast('Nothing due — reviewing your weakest cards');
  }
  runLearn(scope,pool);
}
function startFlagged(scope){
  if(!scope.sets) scope=scopeOf(scope);
  const pool=poolOf(scope).filter(c=>c.starred);
  if(!pool.length){ toast('No flagged cards here yet'); return; }
  runLearn(scope,pool,true);
}
function runLearn(scope,pool,flaggedRun){
  pool=shuffle(pool).slice(0,SESSION_CAP);
  sess={scope,cards:pool,orient:buildOrient(pool),i:0,flipped:false,right:0,wrong:0,mode:'learn',flaggedRun:!!flaggedRun};
  openSession(`
    <div class="sess-top">
      <button class="close" id="x">${xSvg()}</button>
      <div class="progbar"><i id="pb"></i></div>
      <div class="sess-count" id="cnt"></div>
    </div>
    ${dirControlHTML()}
    <div class="cardstage">
      <div class="flip" id="flip"><div class="flip-inner">
        <div class="face front" id="front"></div>
        <div class="face back" id="back"></div>
      </div></div>
    </div>
    <div class="sess-actions" id="acts"></div>`);
  $('#x').onclick=closeSession;
  bindDirControl();
  $('#flip').onclick=()=>revealLearn();
  swipeBind($('#flip'),()=>revealLearn(),()=>revealLearn());
  drawLearn();
}
async function drawLearn(){
  const c=sess.cards[sess.i], defFirst=sess.orient[sess.i];
  sess.flipped=false; $('#flip').classList.remove('flipped');
  $('#cnt').textContent=`${sess.i+1} / ${sess.cards.length}`;
  $('#pb').style.width=`${sess.i/sess.cards.length*100}%`;
  $('#front').innerHTML=await faceHTML(sideOf(c, defFirst?'def':'term'), c, true);
  $('#back').innerHTML =await faceHTML(sideOf(c, defFirst?'term':'def'), c, false);
  $('#acts').innerHTML=`<button class="flipbtn btn-block" id="reveal" style="padding:16px;border-radius:15px;background:var(--chloro);color:#fff;font-weight:600;width:100%">Show answer</button>`;
  $('#reveal').onclick=revealLearn; bindStar(); bindCardExtras();
}
function revealLearn(){
  if(sess.flipped) return; sess.flipped=true; $('#flip').classList.add('flipped');
  $('#acts').innerHTML=`<div class="grade-q">Did you recall it?</div>
    <div class="grade">
      <button class="miss" id="g-miss">Not yet<small>brings it back soon</small></button>
      <button class="got" id="g-got">Got it<small>spaces it out</small></button>
    </div>`;
  $('#g-miss').onclick=()=>answerLearn(false);
  $('#g-got').onclick=()=>answerLearn(true);
}
async function answerLearn(correct){
  const c=sess.cards[sess.i];
  grade(sidOf(c),c.id,correct);
  correct?sess.right++:sess.wrong++;
  await saveProgress(sidOf(c));
  await recordReview(keyFor(c));
  sess.i++;
  if(sess.i>=sess.cards.length){ learnDone(); return; }
  drawLearn();
}
function learnDone(){
  const total=sess.right+sess.wrong, pct=total?Math.round(sess.right/total*100):0;
  const missPct=100-pct;
  const scope=sess.scope, stillDue=scopeDue(scope).length;
  $('#session').innerHTML=`
    <div class="sess-top"><button class="close" id="x">${xSvg()}</button><div class="progbar"><i style="width:100%"></i></div><div class="sess-count"></div></div>
    <div class="results">
      ${ring(pct)}
      <h2>${pct>=80?'Strong session':pct>=50?'Good work':'Keep at it'}</h2>
      <div class="split">
        <div class="split-bar">
          <div class="g" style="width:${pct}%"></div><div class="m" style="width:${missPct}%"></div>
        </div>
        <div class="split-legend">
          <span class="g">Got it · ${pct}% (${sess.right})</span>
          <span class="m">Not yet · ${missPct}% (${sess.wrong})</span>
        </div>
      </div>
      <p>${stillDue?`${stillDue} still to review — go again whenever you like.`:`Nothing left to review here right now.`}</p>
      <div class="btn-row">
        ${stillDue?`<button class="btn btn-primary" id="again">Keep going</button>`:''}
        <button class="btn btn-ghost" id="done">Done</button>
      </div>
    </div>`;
  $('#x').onclick=$('#done').onclick=closeSession;
  if(stillDue) $('#again').onclick=()=>startLearn(scope);
}

/* =========================================================================
   STUDY MODE: Match
   ========================================================================= */
async function startMatch(scope){
  if(!scope.sets) scope=scopeOf(scope);
  const usable=poolOf(scope).filter(c=>c.term&&c.def);
  if(usable.length<3){ toast('Need at least 3 complete cards'); return; }
  const picks=shuffle(usable).slice(0,6);
  const tiles=[];
  for(const c of picks){
    tiles.push({cid:c.id,kind:'t',text:c.term,img:await imgURL(c.termImg)});
    tiles.push({cid:c.id,kind:'d',text:c.def,img:await imgURL(c.defImg)});
  }
  shuffle(tiles);
  sess={scope,start:Date.now(),sel:null,left:picks.length};
  openSession(`
    <div class="sess-top"><button class="close" id="x">${xSvg()}</button><div class="match-timer" id="timer" style="flex:1">0.0s</div><div style="width:38px"></div></div>
    <div class="matchwrap"><div class="matchgrid" id="grid"></div></div>`);
  const grid=$('#grid');
  tiles.forEach((t,idx)=>{ const el=document.createElement('button'); el.className='tile'; el.dataset.cid=t.cid; el.dataset.k=t.kind;
    el.innerHTML=t.img?`<img src="${t.img}" alt="">`:esc(t.text);
    el.onclick=()=>tapTile(el); grid.appendChild(el); });
  $('#x').onclick=closeSession;
  sess.timer=setInterval(()=>{ $('#timer').textContent=((Date.now()-sess.start)/1000).toFixed(1)+'s'; },100);
}
function tapTile(el){
  if(el.classList.contains('gone')||el.classList.contains('sel')) return;
  if(!sess.sel){ sess.sel=el; el.classList.add('sel'); return; }
  const a=sess.sel, b=el;
  if(a.dataset.cid===b.dataset.cid && a.dataset.k!==b.dataset.k){
    a.classList.add('gone'); b.classList.add('gone'); a.classList.remove('sel'); sess.sel=null; sess.left--;
    if(sess.left===0) matchDone();
  } else {
    b.classList.add('bad'); a.classList.add('bad');
    setTimeout(()=>{ a.classList.remove('bad','sel'); b.classList.remove('bad'); },380);
    sess.sel=null;
  }
}
function matchDone(){
  clearInterval(sess.timer);
  const secs=((Date.now()-sess.start)/1000).toFixed(1);
  $('#session').innerHTML=`
    <div class="sess-top"><button class="close" id="x">${xSvg()}</button><div style="flex:1"></div></div>
    <div class="results">${ring(100,secs+'s')}<h2>All matched</h2><p>Finished in ${secs} seconds. Nice and quick.</p>
    <div class="btn-row"><button class="btn btn-primary" id="again">Play again</button><button class="btn btn-ghost" id="done">Done</button></div></div>`;
  $('#x').onclick=$('#done').onclick=closeSession; $('#again').onclick=()=>startMatch(sess.scope);
}

/* =========================================================================
   STUDY MODE: Test
   ========================================================================= */
async function startTest(scope){
  if(!scope.sets) scope=scopeOf(scope);
  const all=poolOf(scope);
  const usable=all.filter(c=>c.term&&c.def);
  if(usable.length<2){ toast('Need at least 2 complete cards'); return; }
  const qs=shuffle(usable.slice()).slice(0,Math.min(12,usable.length)).map((c,i)=>({
    card:c, type:(usable.length>=4 && i%2===0)?'mc':'written'
  }));
  sess={scope,all,qs,i:0,score:0,answered:false};
  openSession(`<div class="sess-top"><button class="close" id="x">${xSvg()}</button><div class="progbar"><i id="pb"></i></div><div class="sess-count" id="cnt"></div></div><div class="testwrap" id="tw"></div>`);
  $('#x').onclick=closeSession;
  await drawTest();
}
async function drawTest(){
  const q=sess.qs[sess.i], c=q.card; sess.answered=false; sess.curKey=keyFor(c);
  $('#cnt').textContent=`${sess.i+1} / ${sess.qs.length}`;
  $('#pb').style.width=`${sess.i/sess.qs.length*100}%`;
  const tw=$('#tw');
  const promptImg=await imgURL(c.termImg);
  const head=`<div class="q-prompt"><div class="qlabel">${promptImg?'Identify this':'What is the definition of'}</div>${promptImg?`<img src="${promptImg}" alt="">`:''}<div class="qterm">${esc(c.term)}</div></div>`;
  if(q.type==='mc'){
    const others=shuffle(sess.all.filter(x=>x.id!==c.id && x.def)).slice(0,3).map(x=>x.def);
    const opts=shuffle([c.def,...others]);
    tw.innerHTML=head+`<div class="opts">${opts.map(o=>`<button class="opt">${esc(o)}</button>`).join('')}</div>`;
    tw.querySelectorAll('.opt').forEach(btn=>btn.onclick=()=>{
      if(sess.answered) return; sess.answered=true;
      const correct=btn.textContent===c.def;
      tw.querySelectorAll('.opt').forEach(o=>{ if(o.textContent===c.def)o.classList.add('correct'); else if(o===btn)o.classList.add('wrong'); else o.classList.add('dim'); o.onclick=null; });
      if(correct)sess.score++;
      nextTestBtn();
    });
  } else {
    tw.innerHTML=head+`<div class="written"><input type="text" id="ans" placeholder="Type the definition…" autocomplete="off"><div id="fb"></div></div>`;
    const inp=$('#ans'); inp.focus();
    const check=()=>{ if(sess.answered) return; sess.answered=true;
      const val=inp.value.trim().toLowerCase(), target=c.def.trim().toLowerCase();
      const ok = val.length>2 && (target.includes(val)||val.includes(target)|| similar(val,target));
      if(ok)sess.score++;
      inp.disabled=true;
      $('#fb').innerHTML=`<div class="feedback ${ok?'ok':'no'}"><b>${ok?'Counted as correct':'Model answer'}</b>${esc(c.def)}</div>`;
      nextTestBtn();
    };
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter')check(); });
    tw.insertAdjacentHTML('beforeend',`<button class="btn btn-primary btn-block" id="checkbtn" style="margin-top:14px">Check answer</button>`);
    $('#checkbtn').onclick=check;
  }
}
function nextTestBtn(){
  recordReview(sess.curKey);
  const tw=$('#tw'); const last=sess.i===sess.qs.length-1;
  tw.insertAdjacentHTML('beforeend',`<button class="btn btn-primary btn-block" id="nextq" style="margin-top:16px">${last?'See results':'Next question'}</button>`);
  $('#nextq').onclick=()=>{ sess.i++; if(sess.i>=sess.qs.length) testDone(); else drawTest(); };
}
function testDone(){
  const pct=Math.round(sess.score/sess.qs.length*100);
  $('#session').innerHTML=`<div class="sess-top"><button class="close" id="x">${xSvg()}</button><div class="progbar"><i style="width:100%"></i></div><div class="sess-count"></div></div>
    <div class="results">${ring(pct)}<h2>${sess.score} / ${sess.qs.length}</h2><p>${pct>=80?'Really solid.':pct>=50?'Decent — worth another Learn round.':'Run a Learn session on this set next.'}</p>
    <div class="btn-row"><button class="btn btn-primary" id="again">Try again</button><button class="btn btn-ghost" id="done">Done</button></div></div>`;
  $('#x').onclick=$('#done').onclick=closeSession; $('#again').onclick=()=>startTest(sess.scope);
}
function similar(a,b){ if(Math.abs(a.length-b.length)>4) return false; let m=0; const s=new Set(b.split(/\s+/)); a.split(/\s+/).forEach(w=>{if(s.has(w))m++}); return m>=Math.max(1,Math.floor(s.size*0.6)); }

   EDITOR
   ========================================================================= */
let draft=null;
function openEditor(set){
  if(set && isCurated(set) && !TEACHER){ toast('This is one of your teacher’s sets — it can’t be changed here.'); return; }
  draft = set ? JSON.parse(JSON.stringify(set)) : {id:uid(),name:'',cards:[]};
  draft._isNew=!set;
  if(!draft.cards.length) draft.cards.push(newCard());
  const m=$('#editor'); m.classList.add('active');
  m.innerHTML=`
    <div class="modal-top">
      <button class="cancel" id="ed-cancel">Cancel</button>
      <h2>${set?'Edit set':'New set'}</h2>
      <button id="ed-save">Save</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Set name</label><input type="text" id="ed-name" value="${esc(draft.name)}" placeholder="e.g. Cell Biology — Unit 1"></div>
      <div class="seg"><button class="on" data-edmode="cards">Card by card</button><button data-edmode="paste">Paste a list</button></div>
      <div id="ed-cards"></div>
      <div id="ed-paste" style="display:none"></div>
      ${set?`<button class="btn" id="ed-delete" style="color:var(--rose);background:var(--rose-soft);width:100%;margin-top:8px">Delete this set</button>`:''}
    </div>`;
  $('#ed-cancel').onclick=()=>m.classList.remove('active');
  $('#ed-save').onclick=saveDraft;
  if(set) $('#ed-delete').onclick=()=>deleteSet(set);
  m.querySelectorAll('[data-edmode]').forEach(b=>b.onclick=()=>{
    m.querySelectorAll('[data-edmode]').forEach(x=>x.classList.toggle('on',x===b));
    const paste=b.dataset.edmode==='paste';
    $('#ed-paste').style.display=paste?'block':'none';
    $('#ed-cards').style.display=paste?'none':'block';
    if(paste) renderPaste();
  });
  renderCards();
}
function newCard(){ return {id:uid(),term:'',def:'',termImg:null,defImg:null}; }
async function renderCards(){
  const wrap=$('#ed-cards'); wrap.innerHTML='';
  for(let idx=0; idx<draft.cards.length; idx++){
    const c=draft.cards[idx];
    const row=document.createElement('div'); row.className='cardrow';
    const tImg=await imgURL(c.termImg), dImg=await imgURL(c.defImg);
    row.innerHTML=`
      <div class="rowhead"><span>CARD ${idx+1}</span><button class="del" data-del="${idx}">Remove</button></div>
      <textarea data-f="term" data-i="${idx}" placeholder="Term / prompt">${esc(c.term)}</textarea>
      <div class="imgrow" style="margin-bottom:10px">
        ${tImg?`<img class="thumb" src="${tImg}">`:''}
        <button class="imgbtn ${c.termImg?'has':''}" data-img="term" data-i="${idx}">${imgIcon()} ${c.termImg?'Change image':'Add image'}</button>
        ${c.termImg?`<button class="imgclear" data-clear="term" data-i="${idx}">remove</button>`:''}
      </div>
      <textarea data-f="def" data-i="${idx}" placeholder="Definition / answer">${esc(c.def)}</textarea>
      <div class="imgrow">
        ${dImg?`<img class="thumb" src="${dImg}">`:''}
        <button class="imgbtn ${c.defImg?'has':''}" data-img="def" data-i="${idx}">${imgIcon()} ${c.defImg?'Change image':'Add image'}</button>

async function loadSetsData(text){
  try{
    const data=JSON.parse(text);
    const sets=Array.isArray(data)?data:data.sets;
    if(!Array.isArray(sets)) throw 0;
    let nSets=0,nCards=0;
    for(const s of sets){
      const set={id:uid(),name:(s.name||'Imported set').toString(),cards:[]};
      for(const c of (s.cards||[])){
        const card={id:uid(),term:(c.term||'').toString(),def:(c.def||'').toString(),termImg:null,defImg:null,starred:false};
        if('simple' in c) card.simple=c.simple;
        if('tr' in c) card.tr=c.tr;
        if('syll' in c) card.syll=c.syll;
        if('parts' in c) card.parts=c.parts;
        if(c.timg) card.termImg=await materializeImg(c.timg);
        if(c.dimg) card.defImg=await materializeImg(c.dimg);
        set.cards.push(card); nCards++;
      }
      if(set.cards.length){ await DB.put('sets',set); nSets++; }
    }
    await loadAll(); if(SETS.length&&!current) current=SETS[0];
    studyScope=null; openChapters=null;
    renderSets(); renderStudy();
    toast(`Imported ${nSets} set${nSets!==1?'s':''} · ${nCards} cards`);
  }catch(e){ toast('That didn’t look like a Recall sets file'); }
}
async function materializeImg(v){
  try{ let blob;
    if(typeof v==='string' && v.trim().startsWith('<svg')) blob=new Blob([v],{type:'image/svg+xml'});
    else if(typeof v==='string' && v.startsWith('data:')){ blob=await (await fetch(v)).blob(); }
    else return null;
    const key='img_'+uid(); await DB.put('images',blob,key); return key;
  }catch(e){ return null; }
}

function mergeProgress(a,b){ const out=JSON.parse(JSON.stringify(a||{}));
  for(const sid in (b||{})){ if(!out[sid]) out[sid]=b[sid]; else {

let fb=null;
async function initFirebase(){ if(!FIREBASE_CONFIG||fb) return fb;
  await loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js');
  await loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js');

async function pushSync(){ if(!FIREBASE_CONFIG||!META.syncCode) return;

async function pullSync(){ if(!FIREBASE_CONFIG||!META.syncCode) return;
  try{ const db=await initFirebase(); const doc=await db.collection('progress').doc(META.syncCode).get();
    if(doc.exists){ PROGRESS=mergeProgress(PROGRESS,doc.data().progress); for(const sid in PROGRESS) await DB.put('progress',PROGRESS[sid]); } }catch(e){ console.warn('pull failed',e); } }
function loadScript(src){ return new Promise((res,rej)=>{ const s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s); }); }

/* ---- Listen: eyes-free play-through of a set/chapter (term → meaning → translation) ---- */
async function startListen(scope){
  if(!scope.sets) scope=scopeOf(scope);
  const pool=poolOf(scope);
  if(!pool.length){ toast('No cards to listen to'); return; }
  if(!ttsOK()){ toast('Audio isn’t available on this device'); return; }
  sess={scope,cards:pool,i:0,mode:'listen',playing:false};
  openSession(`
    <div class="sess-top">
      <button class="close" id="x">${xSvg()}</button>
      <div class="progbar"><i id="pb"></i></div>
      <div class="sess-count" id="cnt"></div>
    </div>
    <div class="listen-stage" id="lstage"></div>
    <div class="sess-actions listen-controls">
      <button class="lc-speed" id="lspeed"></button>
      <div class="lc-main">
        <button class="arrow" id="lprev">${chevron('l')}</button>
        <button class="lplay" id="lplay"></button>
        <button class="arrow" id="lnext">${chevron('r')}</button>
      </div>
      <button class="lc-lang" id="llang">${globeSvg()}</button>
    </div>`);
  $('#x').onclick=()=>{ stopSpeak(); closeSession(); };
  $('#lprev').onclick=()=>listenGo(-1);
  $('#lnext').onclick=()=>listenGo(1);
  $('#lplay').onclick=toggleListen;
  $('#lspeed').onclick=async()=>{ META.slow=!META.slow; await DB.put('meta',META.slow,'slow'); updateListenSpeed(); };
  $('#llang').onclick=()=>openLangPicker();
  drawListen(); updateListenSpeed();
}
function drawListen(){
  const c=sess.cards[sess.i];
  $('#cnt').textContent=`${sess.i+1} / ${sess.cards.length}`;
  $('#pb').style.width=`${(sess.i+1)/sess.cards.length*100}%`;
  let trLine='';
  if(META.lang && c.tr && c.tr[META.lang]){ const L=langMeta(META.lang); trLine=`<div class="def-tr" ${L&&L.rtl?'dir="rtl"':''}>${esc(c.tr[META.lang])}</div>`; }
  $('#lstage').innerHTML=`<div class="listen-card">
    <div class="side-tag">Listening</div>
    <div class="term">${esc(c.term)}</div>
    <div class="ldef">${esc((META.simpleOn&&c.simple)?c.simple:c.def)}</div>
    ${trLine}</div>`;
  updatePlayBtn();
}
function updatePlayBtn(){ const b=$('#lplay'); if(b) b.innerHTML=sess.playing?pauseSvg():playSvg(); }
function updateListenSpeed(){ const b=$('#lspeed'); if(b){ b.textContent=META.slow?'🐢 Slow':'Normal speed'; b.classList.toggle('on',META.slow); } }
function toggleListen(){ sess.playing=!sess.playing; updatePlayBtn(); if(sess.playing) playListen(); else stopSpeak(); }
function listenGo(d){ stopSpeak(); const n=sess.i+d; if(n<0||n>=sess.cards.length){ sess.playing=false; updatePlayBtn(); return; } sess.i=n; drawListen(); if(sess.playing) playListen(); }
function playListen(){
  if(!ttsOK()){ sess.playing=false; updatePlayBtn(); return; }
  const buildParts=()=>{ const c=sess.cards[sess.i]; const arr=[{t:c.term}];
    arr.push({t:(META.simpleOn&&c.simple)?c.simple:c.def});
    if(META.lang&&c.tr&&c.tr[META.lang]){ const L=langMeta(META.lang); if(L&&L.voice) arr.push({t:c.tr[META.lang],lang:L.voice}); }
    return arr; };
  let parts=buildParts(), k=0;
  const step=()=>{
    if(!sess.playing) return;
    if(k>=parts.length){
      if(sess.i>=sess.cards.length-1){ sess.playing=false; updatePlayBtn(); return; }
      sess.i++; drawListen(); parts=buildParts(); k=0; setTimeout(step,350); return;
    }
    const p=parts[k++];
    try{ window.speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(p.t); u.rate=META.slow?0.6:0.85; if(p.lang)u.lang=p.lang;
      u.onend=()=>{ if(sess.playing) setTimeout(step,250); };
      window.speechSynthesis.speak(u);
    }catch(e){ sess.playing=false; updatePlayBtn(); }
  };
  step();
}
function imgIcon(){ return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>`; }
function ring(pct,centre){ const r=64,c=2*Math.PI*r,off=c*(1-pct/100);
  const col=pct>=80?'var(--chloro)':pct>=50?'var(--b3)':'var(--amber)';
  return `<svg class="ring" viewBox="0 0 150 150"><circle cx="75" cy="75" r="${r}" fill="none" stroke="var(--line-2)" stroke-width="11"/><circle cx="75" cy="75" r="${r}" fill="none" stroke="${col}" stroke-width="11" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 75 75)"/><text x="75" y="79" text-anchor="middle" font-family="Inter" font-weight="700" font-size="30" fill="var(--ink)">${centre||pct+'%'}</text></svg>`; }
function swipeBind(el,onLeft,onRight){ let x0=null;
  el.addEventListener('touchstart',e=>{x0=e.touches[0].clientX},{passive:true});
  el.addEventListener('touchend',e=>{ if(x0==null)return; const dx=e.changedTouches[0].clientX-x0; if(Math.abs(dx)>55){ dx<0?onLeft():onRight(); } x0=null; }); }

  META.goal=(await DB.get('meta','goal'))||null;
  if(!META.goal){ const old=await DB.get('meta','goalPerDay');   // migrate the old fixed goal
    META.goal={type:'count',n:old||DEFAULT_GOAL}; }
  TEACHER = !!(await DB.get('meta','teacher'));
}

/* ---- content that ships baked into the app (filled by the build step) ---- */
function readSeed(){ try{ const el=document.getElementById('seed-data'); const d=JSON.parse(el.textContent); return (d&&Array.isArray(d.sets))?d:null; }catch(e){ return null; } }

/* merge bundled content into the device. Keyed by stable ids so a re-publish
   updates the wording of a card WITHOUT wiping the student's progress on it. */
async function syncContent(seed){
  if(!seed||!seed.sets.length) return false;
  const stored = (await DB.get('meta','contentVersion'))||0;
  const ver = seed.version||1;
  if(ver<=stored) return false;                 // already have this version or newer
  const existing={}; (await DB.getAll('sets')).forEach(s=>existing[s.id]=s);
  for(const ss of seed.sets){
    const set = existing[ss.sid] || {id:ss.sid,name:ss.name,cards:[],_managed:true};
    set.name=ss.name; set._managed=true;
    if(ss.chapter!=null) set.chapter=ss.chapter;
    if(ss.order!=null) set.order=ss.order;
    const prev={}; (set.cards||[]).forEach(c=>prev[c.id]=c);
    const cards=[];
    for(const sc of ss.cards){
      const c = prev[sc.cid] || {id:sc.cid,starred:false,termImg:null,defImg:null};
      c.term=sc.term; c.def=sc.def;
      if('simple' in sc) c.simple=sc.simple;
      if('tr' in sc) c.tr=sc.tr;
      if('syll' in sc) c.syll=sc.syll;
      if('parts' in sc) c.parts=sc.parts;
      if('timg' in sc) c.termImg = sc.timg ? await materializeImg(sc.timg) : null;
      if('dimg' in sc) c.defImg = sc.dimg ? await materializeImg(sc.dimg) : null;
      cards.push(c);
    }
    set.cards=cards;
    await DB.put('sets',set);
  }
  await DB.put('meta',ver,'contentVersion');
  return true;
}

/* fallback demo — only used if NO content was baked in (e.g. opened as a bare file) */
async function seedDemoIfEmpty(){
  if((await DB.getAll('sets')).length) return;
  const cellSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150"><ellipse cx="100" cy="75" rx="92" ry="62" fill="#e4f0ea" stroke="#1f6f54" stroke-width="2.5"/><circle cx="100" cy="75" r="26" fill="#cfe6da" stroke="#155a43" stroke-width="2.5"/><circle cx="100" cy="75" r="9" fill="#1f6f54"/><ellipse cx="55" cy="50" rx="16" ry="8" fill="#cf8233" opacity=".55"/><ellipse cx="145" cy="100" rx="16" ry="8" fill="#cf8233" opacity=".55"/></svg>`;
  const key='img_'+uid(); await DB.put('images', new Blob([cellSVG],{type:'image/svg+xml'}), key);
  await DB.put('sets',{ id:uid(), name:'Demo — delete me', cards:[
    {id:uid(),term:'Identify this organelle',def:'Nucleus — controls cell activity and stores DNA',termImg:key,defImg:null,starred:false},
    {id:uid(),term:'Ribosome',def:'Site of protein synthesis (translation of mRNA)',termImg:null,defImg:null,starred:false},
  ]});
}

/* ---- teacher mode: long-press the title to unlock authoring of curated decks ---- */
function updateTeacherBadge(){ const tag=document.querySelector('#screen-sets .tag');
  if(tag){ tag.textContent=TEACHER?'teacher':'biology'; tag.classList.toggle('teacher',TEACHER); } }
async function toggleTeacher(){
  if(TEACHER){ TEACHER=false; await DB.put('meta',false,'teacher'); toast('Student mode'); }
  else{ const code=prompt('Teacher passcode'); if(code==null) return;
    if(code===TEACHER_PASSCODE){ TEACHER=true; await DB.put('meta',true,'teacher'); toast('Teacher mode on'); }
    else{ toast('Incorrect passcode'); return; } }
  updateTeacherBadge(); renderSets(); renderStudy();
}
function bindTeacherUnlock(){
  const w=document.querySelector('#screen-sets .wordmark'); if(!w) return;
  let t=null; const start=()=>{ t=setTimeout(toggleTeacher,700); }; const cancel=()=>{ if(t){clearTimeout(t);t=null;} };
  ['pointerdown','touchstart'].forEach(e=>w.addEventListener(e,start));
  ['pointerup','pointerleave','pointercancel','touchend','touchcancel'].forEach(e=>w.addEventListener(e,cancel));
}

(async function boot(){
  await DB.init();
  SEED=readSeed();
  await syncContent(SEED);            // load / update bundled content, keeping progress
  await seedDemoIfEmpty();            // only fires if nothing was bundled
  await loadAll();
  if(SETS.length) current=SETS[0];
  updateTeacherBadge(); bindTeacherUnlock();
  renderSets();
  if(FIREBASE_CONFIG && META.syncCode){ await pullSync(); renderSets(); renderStudy(); }
})();
</script>
<script>
/* Register the service worker (enables offline + home-screen install).
   Relative 'sw.js' resolves under the page's directory, so it works at
   https://user.github.io/repo/ as well as at a domain root. */
if('serviceWorker' in navigator){
  addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(){ /* offline / file:// — app still runs */ });
  });
}
</script>
