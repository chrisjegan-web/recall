<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1b2a27">
<title>Recall — study cards</title>
<!-- PWA: installable + offline. Relative paths so it works under a GitHub Pages /repo/ subpath. -->
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Recall">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ---------- tokens ---------- */
:root{
  --paper:#f1f4f1;        /* cool specimen paper */
  --surface:#ffffff;
  --surface-2:#f8faf8;
  --ink:#19251f;          /* deep blackish-green */
  --ink-2:#3c4b44;
  --muted:#6c7d74;        /* slate-green grey */
  --line:#dfe6e0;
  --line-2:#e9efe9;
  --chloro:#1f6f54;       /* considered green: primary */
  --chloro-d:#155a43;
  --chloro-soft:#e4f0ea;
  --amber:#cf8233;        /* needs-work / learning */
  --amber-soft:#f6ead9;
  --rose:#b5524b;         /* missed / error */
  --rose-soft:#f6e1df;
  /* leitner progression: warm(new)->green(mastered) */
  --b1:#cf8233; --b2:#bb9740; --b3:#8a9e50; --b4:#4f8a59; --b5:#1f6f54;
  --shadow:0 1px 2px rgba(25,37,31,.06), 0 8px 24px rgba(25,37,31,.07);
  --shadow-lg:0 4px 12px rgba(25,37,31,.10), 0 24px 60px rgba(25,37,31,.14);
  --r:14px; --r-lg:22px;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --serif:'Fraunces',Georgia,'Times New Roman',serif;
  --nav-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans);
  background:var(--paper);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:16px}
:focus-visible{outline:2.5px solid var(--chloro);outline-offset:2px;border-radius:6px}
img{max-width:100%;display:block}

/* ---------- app frame ---------- */
#app{height:100%;display:flex;flex-direction:column;max-width:680px;margin:0 auto;position:relative;background:var(--paper)}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 18px calc(var(--nav-h) + 28px);display:none}
.screen.active{display:block}
.screen.full{padding-bottom:0}

/* ---------- top bar ---------- */
.topbar{
  position:sticky;top:0;z-index:20;background:linear-gradient(var(--paper) 70%, transparent);
  padding:max(14px,env(safe-area-inset-top)) 0 10px;display:flex;align-items:flex-end;gap:10px;
}
.wordmark{font-family:var(--serif);font-weight:600;font-size:25px;letter-spacing:-.01em;color:var(--ink);line-height:1}
.wordmark .dot{color:var(--chloro)}
.tag{font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;font-weight:600;padding-bottom:3px}
.tag.teacher{color:#fff;background:var(--chloro);padding:2px 8px;border-radius:8px;letter-spacing:.08em}
.topbar .spacer{flex:1}
.ico-btn{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;background:var(--surface);box-shadow:var(--shadow);color:var(--ink-2)}
.ico-btn:active{transform:scale(.94)}
.ico-btn.on{background:var(--ink);color:#fff}
/* manage mode */
.manage-note{background:var(--amber-soft);color:#8a5320;border-radius:14px;padding:11px 15px;font-size:13px;line-height:1.4;margin-bottom:14px}
.manage-note b{font-weight:700}
.ch-del,.set-del{flex-shrink:0;display:grid;place-items:center;width:38px;height:38px;border-radius:11px;background:var(--rose-soft);color:var(--rose);transition:transform .1s}
.ch-del:active,.set-del:active{transform:scale(.88)}
.setcard.managing{position:relative;padding-right:54px}
.set-del{position:absolute;top:14px;right:14px;width:36px;height:36px}
.chapter-head.managing{cursor:default}

/* ---------- bottom nav ---------- */
nav.tabbar{
  position:absolute;bottom:0;left:0;right:0;height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
  background:rgba(255,255,255,.86);backdrop-filter:blur(14px);
  border-top:1px solid var(--line);display:flex;z-index:30;
}
nav.tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.01em}
nav.tabbar button svg{width:23px;height:23px;stroke-width:1.9}
nav.tabbar button.on{color:var(--chloro)}
nav.tabbar button.on svg{stroke-width:2.3}

/* ---------- cards / lists ---------- */
.section-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600;margin:22px 2px 11px}
.setcard{
  background:var(--surface);border-radius:var(--r-lg);padding:17px 18px;box-shadow:var(--shadow);
  margin-bottom:13px;display:block;width:100%;text-align:left;position:relative;overflow:hidden;
  transition:transform .15s ease;
}
.setcard:active{transform:scale(.985)}
.setcard h3{font-family:var(--serif);font-weight:600;font-size:19px;letter-spacing:-.01em;margin-bottom:3px}
.setcard .meta{font-size:13px;color:var(--muted);display:flex;gap:12px;align-items:center}
.setcard .meta b{color:var(--chloro);font-weight:600}
.due-pill{display:inline-flex;align-items:center;gap:5px;background:var(--chloro-soft);color:var(--chloro-d);font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px;margin-top:9px}
.due-pill.clear{background:var(--surface-2);color:var(--muted)}

/* set-card progress bar (clear: how learned the set is) */
.setcard .meta .pct{margin-left:auto;color:var(--chloro);font-weight:600}
.prog{height:7px;background:var(--line-2);border-radius:5px;overflow:hidden;margin-top:11px}
.prog>i{display:block;height:100%;background:linear-gradient(90deg,var(--b3),var(--chloro));border-radius:5px;transition:width .5s cubic-bezier(.2,.8,.2,1)}

/* chapter dropdowns */
.chapter{margin-bottom:12px}
.chapter-head{width:100%;display:flex;align-items:center;gap:13px;background:var(--surface);border-radius:var(--r-lg);padding:14px 16px;box-shadow:var(--shadow);text-align:left;transition:transform .12s}
.chapter-head:active{transform:scale(.99)}
.ch-badge{flex-shrink:0;min-width:42px;height:42px;padding:0 8px;border-radius:12px;background:var(--ink);color:#fff;font-weight:700;font-size:14px;display:grid;place-items:center;letter-spacing:.02em}
.ch-badge.alt{background:var(--amber)}
.ch-meta{flex:1;min-width:0}
.ch-title{font-family:var(--serif);font-weight:600;font-size:17px;letter-spacing:-.01em;line-height:1.15}
.ch-sub{font-size:12.5px;color:var(--muted);margin-top:2px}
.ch-sub b{color:var(--chloro-d);font-weight:600}
.ch-sub .ch-pct{color:var(--chloro);font-weight:600}
.chev{flex-shrink:0;color:var(--muted);transition:transform .25s}
.chapter-head.open .chev{transform:rotate(180deg)}
.chapter-body{padding:11px 2px 2px}
.ch-studyall{width:100%;display:flex;align-items:center;gap:10px;background:var(--chloro-soft);color:var(--chloro-d);border-radius:14px;padding:13px 15px;font-weight:600;font-size:14px;margin-bottom:11px;box-shadow:var(--shadow);transition:transform .12s}
.ch-studyall:active{transform:scale(.98)}
.ch-studyall span{flex:1;text-align:left}
.ch-studyall em{font-style:normal;font-size:12px;font-weight:600;opacity:.7}
.ch-sets .setcard{margin-bottom:10px}
.scope-flag{display:inline-block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;color:var(--chloro-d);background:var(--chloro-soft);padding:4px 10px;border-radius:20px;margin-bottom:8px}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:600;font-size:15px;
  padding:13px 20px;border-radius:13px;transition:transform .12s ease,background .15s}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--chloro);color:#fff;box-shadow:0 4px 14px rgba(31,111,84,.28)}
.btn-primary:active{background:var(--chloro-d)}
.btn-ghost{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}
.btn-soft{background:var(--chloro-soft);color:var(--chloro-d)}
.btn-block{width:100%}
.btn-row{display:flex;gap:10px}
.fab{position:absolute;right:18px;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px);
  width:56px;height:56px;border-radius:18px;background:var(--chloro);color:#fff;display:grid;place-items:center;
  box-shadow:0 6px 20px rgba(31,111,84,.4);z-index:25}
.fab:active{transform:scale(.92)}
.fab svg{width:26px;height:26px;stroke-width:2.4}

/* ---------- empty states ---------- */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty .glyph{width:64px;height:64px;margin:0 auto 16px;color:var(--line);}
.empty h3{font-family:var(--serif);font-weight:600;font-size:20px;color:var(--ink-2);margin-bottom:7px}
.empty p{font-size:14px;line-height:1.5;max-width:280px;margin:0 auto 18px}

/* ---------- study: mode picker ---------- */
.study-head{padding-top:6px}
.study-head h2{font-family:var(--serif);font-size:26px;font-weight:600;letter-spacing:-.02em;margin-bottom:4px}
.study-head .sub{color:var(--muted);font-size:14px;margin-bottom:6px}
.head-controls{display:flex;gap:9px;flex-wrap:wrap;margin-top:10px}
.head-controls .btn{font-size:13px;padding:8px 13px}
.head-controls .flagged-btn{display:inline-flex;align-items:center;gap:6px;background:var(--amber-soft);color:#9a5d1d}
.dir-row{display:flex;align-items:center;gap:11px;margin-top:14px}
.dir-label{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.02em;flex-shrink:0}
.sess-dir{display:flex;justify-content:center;padding:6px 18px 0}
.sess-dir .seg.dir-seg{margin-bottom:0;max-width:340px;width:100%}
.seg.dir-seg{flex:1;margin-bottom:0}
.seg.dir-seg button{padding:8px 4px;font-size:12.5px}
.split{width:100%;max-width:320px;margin:2px 0 22px}
.split-bar{display:flex;height:14px;border-radius:8px;overflow:hidden;background:var(--line-2)}
.split-bar .g{background:var(--chloro);transition:width .5s ease}
.split-bar .m{background:var(--rose);transition:width .5s ease}
.split-legend{display:flex;justify-content:space-between;font-size:12.5px;font-weight:600;margin-top:9px}
.split-legend .g{color:var(--chloro-d)}
.split-legend .m{color:var(--rose)}
.modegrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
.modecard{background:var(--surface);border-radius:var(--r);padding:18px 16px;box-shadow:var(--shadow);text-align:left;display:flex;flex-direction:column;gap:10px;min-height:120px;transition:transform .14s}
.modecard:active{transform:scale(.97)}
.modecard .ic{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;background:var(--chloro-soft);color:var(--chloro-d)}
.modecard.amber .ic{background:var(--amber-soft);color:#9a5d1d}
.modecard h4{font-size:16px;font-weight:600}
.modecard p{font-size:12.5px;color:var(--muted);line-height:1.4}
.modecard.wide{grid-column:1/-1;flex-direction:row;align-items:center;min-height:0}
.modecard.wide .txt{flex:1}

/* full leitner board */
.board{background:var(--surface);border-radius:var(--r-lg);padding:18px;box-shadow:var(--shadow);margin-top:20px}
.board h4{font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:2px}
.board .hint{font-size:12px;color:var(--muted);margin-bottom:16px}
.boxes{display:flex;align-items:flex-end;gap:8px;height:108px}
.box{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.box .bar{width:100%;border-radius:8px 8px 4px 4px;min-height:5px;transition:height .5s cubic-bezier(.2,.8,.2,1);position:relative}
.box .cnt{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
.box .lbl{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.02em;text-align:center}
.box:nth-child(1) .bar{background:var(--b1)}.box:nth-child(2) .bar{background:var(--b2)}
.box:nth-child(3) .bar{background:var(--b3)}.box:nth-child(4) .bar{background:var(--b4)}.box:nth-child(5) .bar{background:var(--b5)}

/* ---------- daily rhythm: gentle streak + weekly strip ---------- */
.streak{background:var(--surface);border-radius:var(--r-lg);padding:15px 16px 14px;box-shadow:var(--shadow);margin-bottom:18px}
.streak-top{display:flex;align-items:center;gap:12px;margin-bottom:13px}
.streak-flame{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;flex-shrink:0;background:var(--chloro-soft);color:var(--chloro-d)}
.streak-flame.rest{background:var(--surface-2);color:var(--muted)}
.streak-main{flex:1;min-width:0}
.streak-head{font-size:15px;font-weight:700;color:var(--ink);font-family:var(--serif);line-height:1.15}
.streak-sub{font-size:12.5px;color:var(--muted);margin-top:2px}
.streak-goal{font-size:11.5px;font-weight:600;color:var(--chloro-d);background:var(--chloro-soft);padding:7px 10px;border-radius:10px;flex-shrink:0;white-space:nowrap}
.streak-goal.done{background:var(--surface-2);color:var(--muted)}
.week{display:flex;gap:6px}
.wd{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.wd .dl{font-size:9.5px;font-weight:700;color:var(--muted);letter-spacing:.03em;text-transform:uppercase}
.wd .dot{width:100%;max-width:34px;aspect-ratio:1;border-radius:10px;background:var(--surface-2);box-shadow:inset 0 0 0 1px var(--line-2);display:grid;place-items:center;color:transparent}
.wd.studied .dot{background:var(--chloro);box-shadow:none;color:#fff}
.wd.rest .dot{background:var(--surface);box-shadow:inset 0 0 0 1.5px var(--line);color:var(--muted)}
.wd.today .dl{color:var(--chloro-d)}
.wd.today .dot{box-shadow:inset 0 0 0 2px var(--chloro)}
.wd.today.studied .dot{box-shadow:inset 0 0 0 2px var(--chloro-d)}
.wd.future .dl{opacity:.45}
.wd.future .dot{opacity:.4}
.wd .dot svg{width:16px;height:16px}
.goal-sheet .sheet-divide{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:16px 2px 10px}
.goal-nums{display:flex;gap:8px;margin-bottom:12px}
.goal-nums .gnum{flex:1;padding:14px 0;border-radius:13px;background:var(--surface-2);font-weight:700;font-size:17px;color:var(--ink-2);box-shadow:inset 0 0 0 1px var(--line-2)}
.goal-nums .gnum.on{background:var(--chloro-soft);color:var(--chloro-d);box-shadow:inset 0 0 0 1.5px var(--chloro)}
.goal-scopes{max-height:38vh;overflow-y:auto}
.goal-scopes .sheet-opt.sub{margin-left:14px;background:var(--surface);box-shadow:inset 0 0 0 1px var(--line-2);font-weight:500;font-size:15px}

/* ---------- study session: flashcard ---------- */
.session{position:fixed;inset:0;background:var(--paper);z-index:60;display:none;flex-direction:column;max-width:680px;margin:0 auto}
.session.active{display:flex}
.sess-top{display:flex;align-items:center;gap:14px;padding:max(14px,env(safe-area-inset-top)) 18px 8px}
.sess-top .close{width:38px;height:38px;border-radius:11px;background:var(--surface);box-shadow:var(--shadow);display:grid;place-items:center;color:var(--ink-2);flex-shrink:0}
.progbar{flex:1;height:7px;background:var(--line-2);border-radius:5px;overflow:hidden}
.progbar>i{display:block;height:100%;background:var(--chloro);border-radius:5px;transition:width .35s ease;width:0}
.sess-count{font-size:13px;font-weight:600;color:var(--muted);font-variant-numeric:tabular-nums;flex-shrink:0}

.cardstage{flex:1;display:flex;flex-direction:column;justify-content:center;padding:8px 18px 18px;min-height:0}
.flip{perspective:1600px;flex:1;max-height:480px;min-height:280px;margin-bottom:16px}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .5s cubic-bezier(.4,.0,.2,1);transform-style:preserve-3d;cursor:pointer}
.flip.flipped .flip-inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;overflow:hidden;text-align:center}
.face.back{transform:rotateY(180deg)}
.face .side-tag{position:absolute;top:16px;left:20px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600}
.face .star{position:absolute;top:13px;right:16px;width:34px;height:34px;display:grid;place-items:center;color:var(--line);border-radius:9px}
.face .star.on{color:var(--amber)}
.face .flag{position:absolute;top:13px;right:14px;width:36px;height:36px;display:grid;place-items:center;color:var(--line);border-radius:10px;transition:color .15s,transform .1s}
.face .flag:active{transform:scale(.88)}
.face .flag.on{color:var(--amber)}
.face .term{font-family:var(--serif);font-weight:600;font-size:clamp(22px,6vw,34px);line-height:1.15;letter-spacing:-.01em}
.face .def{font-size:clamp(16px,4.4vw,20px);line-height:1.45;color:var(--ink-2);font-weight:400}
.face img.cardimg{max-height:48%;width:auto;border-radius:12px;margin-bottom:18px;object-fit:contain;box-shadow:0 2px 10px rgba(25,37,31,.12)}
.face .tap-hint{position:absolute;bottom:16px;font-size:12px;color:var(--muted)}
/* per-card audio + simpler + translate */
.def-tr{font-size:clamp(15px,4vw,19px);line-height:1.5;color:var(--chloro-d);margin-top:12px;font-weight:500}
.parts-panel{margin-top:14px;width:100%}
.syll{font-size:clamp(18px,5.5vw,26px);font-weight:600;letter-spacing:.05em;color:var(--chloro-d);margin-bottom:11px}
.morphs{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
.morph{background:var(--chloro-soft);color:var(--chloro-d);border-radius:11px;padding:6px 12px;font-size:13.5px;line-height:1.3}
.morph b{font-weight:700}
.card-audio{display:flex;gap:9px;margin-top:16px}
.cbtn{display:grid;place-items:center;min-width:42px;height:42px;padding:0 12px;border-radius:12px;background:var(--surface-2);color:var(--ink-2);box-shadow:inset 0 0 0 1px var(--line-2);font-weight:700;font-size:15px;transition:transform .1s}
.cbtn:active{transform:scale(.9)}
.cbtn.on{background:var(--chloro-soft);color:var(--chloro-d);box-shadow:inset 0 0 0 1.5px var(--chloro)}
/* language bottom sheet */
.sheet{position:fixed;inset:0;z-index:90;background:rgba(25,37,31,.4);display:flex;align-items:flex-end;justify-content:center;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet-card{background:var(--surface);width:100%;max-width:520px;border-radius:22px 22px 0 0;padding:20px 18px calc(env(safe-area-inset-bottom) + 20px);box-shadow:var(--shadow-lg)}
.sheet-h{font-family:var(--serif);font-weight:600;font-size:18px;margin-bottom:14px}
.sheet-opt{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:14px 15px;border-radius:13px;background:var(--surface-2);margin-bottom:9px;font-size:17px;font-weight:600}
.sheet-opt em{font-style:normal;font-size:13px;color:var(--muted);font-weight:500;margin-left:auto}
.sheet-opt.on{background:var(--chloro-soft);color:var(--chloro-d);box-shadow:inset 0 0 0 1.5px var(--chloro)}
/* Listen player */
.listen-stage{flex:1;display:flex;align-items:center;justify-content:center;padding:18px;min-height:0}
.listen-card{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);padding:30px 26px;width:100%;max-width:460px;text-align:center;position:relative}
.listen-card .term{font-family:var(--serif);font-weight:600;font-size:clamp(24px,6vw,34px);line-height:1.15;margin-bottom:14px}
.listen-card .ldef{font-size:clamp(16px,4.4vw,20px);line-height:1.45;color:var(--ink-2)}
.listen-controls{display:flex;align-items:center;justify-content:space-between;padding:0 18px calc(env(safe-area-inset-bottom) + 20px);gap:10px}
.lc-main{display:flex;align-items:center;gap:14px}
.lplay{width:68px;height:68px;border-radius:50%;background:var(--chloro);color:#fff;display:grid;place-items:center;box-shadow:0 6px 18px rgba(31,111,84,.35)}
.lplay:active{transform:scale(.94)}
.lc-speed{font-size:12.5px;font-weight:600;color:var(--muted);background:var(--surface);box-shadow:var(--shadow);padding:9px 12px;border-radius:11px;min-width:96px}
.lc-speed.on{background:var(--amber-soft);color:#9a5d1d}
.lc-lang{width:42px;height:42px;border-radius:12px;background:var(--surface);box-shadow:var(--shadow);color:var(--ink-2);display:grid;place-items:center}

.sess-actions{padding:0 18px calc(env(safe-area-inset-bottom) + 18px)}
.grade{display:flex;gap:12px}
.grade-q{text-align:center;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:10px;letter-spacing:.01em}
.grade button{flex:1;padding:16px;border-radius:15px;font-weight:600;font-size:15px;display:flex;flex-direction:column;align-items:center;gap:3px;box-shadow:var(--shadow)}
.grade .miss{background:var(--rose-soft);color:#8f3a35}
.grade .got{background:var(--chloro-soft);color:var(--chloro-d)}
.grade button small{font-weight:500;font-size:11px;opacity:.75}
.grade button:active{transform:scale(.96)}
.nav-flip{display:flex;gap:12px;align-items:center}
.nav-flip .arrow{width:54px;height:54px;border-radius:15px;background:var(--surface);box-shadow:var(--shadow);display:grid;place-items:center;color:var(--ink-2)}
.nav-flip .arrow:disabled{opacity:.4}
.nav-flip .flipbtn{flex:1;padding:16px;border-radius:15px;background:var(--chloro);color:#fff;font-weight:600;box-shadow:0 4px 14px rgba(31,111,84,.28)}

/* ---------- match game ---------- */
.matchwrap{flex:1;display:flex;flex-direction:column;padding:6px 14px 16px;min-height:0}
.matchgrid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:9px;align-content:start;overflow-y:auto;padding:4px 0}
.tile{background:var(--surface);border-radius:13px;box-shadow:var(--shadow);padding:13px 11px;font-size:13.5px;line-height:1.3;
  display:flex;align-items:center;justify-content:center;text-align:center;min-height:74px;transition:all .18s;position:relative;font-weight:500}
.tile img{max-height:54px;width:auto;border-radius:6px}
.tile.sel{box-shadow:0 0 0 2.5px var(--chloro),var(--shadow);background:var(--chloro-soft)}
.tile.gone{opacity:0;pointer-events:none;transform:scale(.8)}
.tile.bad{box-shadow:0 0 0 2.5px var(--rose);animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.match-timer{text-align:center;font-variant-numeric:tabular-nums;font-weight:700;font-size:18px;color:var(--ink-2);padding:4px 0 8px}

/* ---------- test ---------- */
.testwrap{flex:1;display:flex;flex-direction:column;padding:8px 18px 18px;overflow-y:auto;min-height:0}
.q-prompt{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);padding:22px;margin-bottom:18px;text-align:center}
.q-prompt .qlabel{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:10px}
.q-prompt .qterm{font-family:var(--serif);font-size:24px;font-weight:600;line-height:1.2}
.q-prompt img{max-height:160px;width:auto;margin:0 auto 8px;border-radius:10px}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:var(--surface);border-radius:13px;box-shadow:var(--shadow);padding:15px 16px;text-align:left;font-size:15px;font-weight:500;line-height:1.35;transition:all .15s}
.opt:active{transform:scale(.99)}
.opt.correct{background:var(--chloro-soft);box-shadow:0 0 0 2px var(--chloro)}
.opt.wrong{background:var(--rose-soft);box-shadow:0 0 0 2px var(--rose)}
.opt.dim{opacity:.5}
.written input{width:100%;background:var(--surface);border:1.5px solid var(--line);border-radius:13px;padding:15px;box-shadow:var(--shadow)}
.written .feedback{margin-top:14px;padding:15px;border-radius:13px;font-size:14px;line-height:1.5}
.written .feedback.ok{background:var(--chloro-soft);color:var(--chloro-d)}
.written .feedback.no{background:var(--rose-soft);color:#8f3a35}
.written .feedback b{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;opacity:.8}

/* results */
.results{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center}
.results .ring{width:150px;height:150px;margin-bottom:24px}
.results h2{font-family:var(--serif);font-size:30px;font-weight:600;margin-bottom:6px}
.results p{color:var(--muted);font-size:15px;margin-bottom:28px;max-width:300px;line-height:1.5}

/* ---------- editor / modal ---------- */
.modal{position:fixed;inset:0;z-index:80;display:none;flex-direction:column;background:var(--paper);max-width:680px;margin:0 auto}
.modal.active{display:flex}
.modal-top{display:flex;align-items:center;justify-content:space-between;padding:max(14px,env(safe-area-inset-top)) 18px 12px;border-bottom:1px solid var(--line)}
.modal-top h2{font-family:var(--serif);font-size:20px;font-weight:600}
.modal-top button{font-weight:600;font-size:15px;color:var(--chloro);padding:6px 4px}
.modal-top button.cancel{color:var(--muted)}
.modal-body{flex:1;overflow-y:auto;padding:18px 18px calc(env(safe-area-inset-bottom) + 24px)}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:7px;letter-spacing:.01em}
.field input[type=text],.field textarea{width:100%;background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;line-height:1.4}
.field textarea{resize:vertical;min-height:74px}
.field input:focus,.field textarea:focus{border-color:var(--chloro);outline:none}
.help{font-size:12px;color:var(--muted);line-height:1.45;margin-top:6px}

/* card editor rows */
.cardrow{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);padding:14px;margin-bottom:11px}
.cardrow .rowhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cardrow .rowhead span{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.08em}
.cardrow .del{color:var(--rose);font-size:13px;font-weight:600}
.cardrow textarea{width:100%;background:var(--surface-2);border:1px solid var(--line-2);border-radius:10px;padding:10px;min-height:46px;resize:vertical;margin-bottom:8px;font-size:14px;line-height:1.35}
.imgrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.imgrow .thumb{width:50px;height:50px;border-radius:8px;object-fit:cover;box-shadow:var(--shadow)}
.imgbtn{font-size:12px;font-weight:600;color:var(--chloro-d);background:var(--chloro-soft);padding:8px 12px;border-radius:9px;display:inline-flex;gap:5px;align-items:center}
.imgbtn.has{background:var(--amber-soft);color:#9a5d1d}
.imgclear{font-size:12px;color:var(--muted);font-weight:600;padding:6px}

/* segmented */
.seg{display:flex;background:var(--surface-2);border-radius:12px;padding:4px;margin-bottom:18px;box-shadow:inset 0 0 0 1px var(--line-2)}
.seg button{flex:1;padding:9px;border-radius:9px;font-size:13.5px;font-weight:600;color:var(--muted)}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}

/* ---------- sync ---------- */
.sync-card{background:var(--surface);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow);margin-bottom:14px}
.sync-card h3{font-family:var(--serif);font-size:18px;font-weight:600;margin-bottom:5px}
.sync-card p{font-size:13.5px;color:var(--muted);line-height:1.5;margin-bottom:14px}
.codebox{display:flex;align-items:center;gap:10px;background:var(--surface-2);border:1.5px dashed var(--line);border-radius:13px;padding:14px 16px;margin-bottom:14px}
.codebox .code{font-family:'Inter',monospace;font-size:21px;font-weight:700;letter-spacing:.08em;color:var(--chloro-d);flex:1}
.codebox .copy{font-size:12px;font-weight:600;color:var(--chloro);padding:8px 10px;background:var(--chloro-soft);border-radius:9px}
.sync-status{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;padding:5px 11px;border-radius:20px;margin-bottom:14px}
.sync-status.live{background:var(--chloro-soft);color:var(--chloro-d)}
.sync-status.local{background:var(--amber-soft);color:#9a5d1d}
.sync-status .pip{width:7px;height:7px;border-radius:50%;background:currentColor}

/* toast */
#toast{position:fixed;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 22px);left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:12px 20px;border-radius:30px;font-size:14px;font-weight:500;
  box-shadow:var(--shadow-lg);z-index:200;opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap;max-width:90vw}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
@media (min-width:520px){.modegrid .modecard{min-height:140px}}
</style>
</head>

 A with T, and G with C.", "tr": {"ar": "قاعدة ازدواج القواعد: A مع T، وG مع C.", "tr": "Bazların eşleşme kuralı: A ile T, G ile C.", "vi": "Quy tắc bắt cặp của các base: A với T, G với C.", "prs": "قاعدهٔ جفت‌شدن بازها: A با T و G با C."}}, {"term": "Double helix", "def": "Two antiparallel polynucleotide strands twisted into a spiral, held together by hydrogen bonds between complementary bases.", "cid": "dna-structure-organisation-05", "simple": "DNA's shape: two strands twisted together, like a twisted ladder.", "tr": {"ar": "شكل الحمض النووي: شريطان ملتفّان معًا مثل سلّم ملتوٍ.", "tr": "DNA'nın şekli: birbirine dolanmış iki iplik, bükülmüş bir merdiven gibi.", "vi": "Hình dạng của DNA: hai mạch xoắn vào nhau như một chiếc thang xoắn.", "prs": "شکل DNA: دو رشته که مانند یک نردبان پیچ‌خورده به هم تابیده‌اند."}}, {"term": "Antiparallel strands", "def": "The two DNA strands run in opposite directions to one another (one 5' to 3', the other 3' to 5').", "cid": "dna-structure-organisation-06", "simple": "The two DNA strands run in opposite directions.", "tr": {"ar": "شريطا الحمض النووي يسيران في اتجاهين متعاكسين.", "tr": "İki DNA ipliği zıt yönlerde uzanır.", "vi": "Hai mạch DNA chạy ngược chiều nhau.", "prs": "دو رشتهٔ DNA در جهت‌های مخالف قرار دارند."}}, {"term": "Sugar-phosphate backbone", "def": "The alternating sugar and phosphate groups forming the two sides of the DNA molecule, joined by strong covalent bonds.", "cid": "dna-structure-organisation-07", "simple": "The two long sides of the DNA ladder, made of sugar and phosphate.", "tr": {"ar": "جانبا سلّم الحمض النووي الطويلان، المكوّنان من السكر والفوسفات.", "tr": "DNA merdiveninin şeker ve fosfattan oluşan iki uzun kenarı.", "vi": "Hai cạnh dài của thang DNA, được tạo từ đường và phosphate.", "prs": "دو کنارهٔ بلند نردبان DNA که از قند و فسفات ساخته شده‌اند."}}, {"term": "Hydrogen bonds (in DNA)", "def": "Weak bonds between complementary bases that hold the two strands together and can break so the strands separate.", "cid": "dna-structure-organisation-08", "simple": "Weak bonds that hold the two DNA strands together. They come apart easily.", "tr": {"ar": "روابط ضعيفة تربط شريطي الحمض النووي معًا، وتنفصل بسهولة.", "tr": "İki DNA ipliğini bir arada tutan zayıf bağlar. Kolayca ayrılırlar.", "vi": "Các liên kết yếu giữ hai mạch DNA với nhau. Chúng dễ tách ra.", "prs": "پیوندهای ضعیفی که دو رشتهٔ DNA را به هم نگه می‌دارند و به‌آسانی جدا می‌شوند."}}, {"term": "Transcription", "def": "The process of copying a gene's DNA sequence into a complementary mRNA molecule, occurring in the nucleus.", "cid": "dna-structure-organisation-09", "simple": "Copying a gene from DNA into mRNA. It happens in the nucleus.", "syll": "Tran·scrip·tion", "tr": {"ar": "نسخ الجين من الحمض النووي إلى mRNA. يحدث داخل النواة.", "tr": "Bir genin DNA'dan mRNA'ya kopyalanması. Çekirdekte gerçekleşir.", "vi": "Sao chép một gen từ DNA thành mRNA. Quá trình này xảy ra trong nhân.", "prs": "رونویسی یک ژن از DNA به mRNA. این کار در هستهٔ سلول انجام می‌شود."}, "timg": "data:image/webp;base64,UklGRig1AABXRUJQVlA4IBw1AABQDAGdASqEA4wBPm02l0ikIyKhIvJ5qIANiWdu+F+7IeBixh/Va7H+6ns38T++eEooP/we9/sjy7+hPRH/m/U7/wvUA/3npt9Ff7t+oD9h/3M93D/V/uJ/9PhZ/jfSj9Jf/m///3LP7X/v///7if8y/73rUf/T2cv8T6v/+v9AD//8Ef5J/r/5LeEP93/Xj/df071D/H/n37x/bf2p/uPtxZj+rv+4/sfqZ/LPsZ+O/uX7qf4D5q/v3+e8Ifif/TeoL+VfzH/K/1L9zv8V6pe0o2L9u/UF9cfrn+7/vH5OejP/W/371K+u3/D9wD+Z/1L/ff3n2k/yvhh+jfsx8Af9E/x3/q/zPuzf2f/r/2Hoh+o//V/n/gN/oH9r/6n+D/z3c+9JP92RY/+6FVUl0ECNN8uggRpvl0ECNN8uggRpvl0ECNN8tTSRWkB/aWtrcpw6IZTRqvI8nkS3lssjtVOTbZhXmz0EsAv4f84bDDs9yt553AYbyfEskHW34UmZMRIC/zmxcEsQTiIq5zeUXiAKdJQhrolK55pbWmHIBhl+utIGIdDtof7R0uINN18vS14K/QwkK0aVSdDkgVh5Fyg3Gli1nD3zeKKijvxjTCzyjzNwZKsEUCCVAFwej/eDz8kcWDw9mzuNuxe9y7MnjrctVptIW9KPZsWoeVWbFvAhcHlX6TbniOQs3xZjfLoIEab5dBAjTfG/Uf/3H3VoXOKwG3CQt6CqCJaMKrAFDCRQbTDodlKZKBITkkX4HmsC1tBQG4L1htnVAWL5/mhVklDcAF7/ANwvsFPRK/ngmyLJLDeHhCUVUJtlT/d4BGm+XQQI03y6CBGm+XRXYXdQUT8ABwjBQxVjL3dS6ZnAkTyC60vKGbmURmPg37lQ0wpSCoqBZf6f/wYmjqW9latY حلقة واحدة تسبح بحرّية. لا توجد نواة.", "tr": "Bakteri gibi basit hücrelerde DNA, serbestçe yüzen tek bir halkadır. Çekirdek yoktur.", "vi": "Ở tế bào đơn giản như vi khuẩn, DNA là một vòng tròn trôi tự do. Không có nhân.", "prs": "در سلول‌های ساده مانند باکتری، DNA یک حلقهٔ آزاد است و هسته وجود ندارد."}}, {"term": "DNA in eukaryotic cells", "def": "Linear chromosomes enclosed within a membrane-bound nucleus.", "cid": "dna-structure-organisation-12", "simple": "In complex cells, DNA is in straight pieces kept inside a nucleus.", "tr": {"ar": "في الخلايا المعقّدة، يكون الحمض النووي في قطع مستقيمة محفوظة داخل النواة.", "tr": "Karmaşık hücrelerde DNA, çekirdek içinde tutulan düz parçalar hâlindedir.", "vi": "Ở tế bào phức tạp, DNA ở dạng các đoạn thẳng nằm trong nhân.", "prs": "در سلول‌های پیچیده، DNA به‌صورت قطعه‌های مستقیم درون هسته نگه‌داری می‌شود."}}, {"term": "Gene", "def": "A segment of DNA that codes for a functional product, usually a polypeptide (protein).", "cid": "dna-structure-organisation-13", "simple": "A piece of DNA with the instructions to make one product, usually a protein.", "tr": {"ar": "قطعة من الحمض النووي تحمل تعليمات صنع منتج واحد، غالبًا بروتين.", "tr": "Genellikle bir protein olan tek bir ürünü yapma talimatlarını taşıyan bir DNA parçası.", "vi": "Một đoạn DNA chứa chỉ dẫn để tạo ra một sản phẩm, thường là protein.", "prs": "قطعه‌ای از DNA که دستورالعمل ساخت یک محصول، معمولاً یک پروتئین، را دارد."}}], "chapter": "DNA", "order": 1, "sid": "dna-structure-organisation"}, {"name": "Chromosomes, Genes & Alleles (7A)", "cards": [{"term": "Chromosome", "def": "A structure made of DNA tightly coiled around histone proteins, carrying genetic information.", "cid": "chromosomes-genes-alleles-7a-01", "simple": "DNA wound tightly around proteins to make one packaged structure.", "parts": [{"p": "chromo", "m": "colour"}, {"p": "some", "m": "body"}], "syll": "Chro·mo·some", "tr": {"ar": "حمض نووي ملتفّ بإحكام حول بروتينات لتكوين تركيب واحد مُعبّأ.", "tr": "Proteinlerin etrafına sıkıca sarılarak tek bir paketlenmiş yapı oluşturan DNA.", "vi": "DNA cuộn chặt quanh các protein để tạo thành một cấu trúc được đóng gói.", "prs": "DNA که محکم به دور پروتئین‌ها پیچیده تا یک ساختار بسته‌بندی‌شده بسازد."}}, {"term": "Histones", "def": "The proteins that DNA wraps around to package it neatly into a chromosome.", "cid": "chromosomes-genes-alleles-7a-02", "simple": "Proteins that DNA wraps around to pack it up neatly.", "syll": "His·tones", "tr": {"ar": "بروتينات يلتفّ حولها الحمض النووي لتعبئته بشكل مرتّب.", "tr": "DNA'nın düzgünce paketlenmek için etrafına sarıldığı proteinler.", "vi": "Các protein mà DNA cuộn quanh để đóng gói gọn gàng.", "prs": "پروتئین‌هایی که DNA به دور آن‌ها می‌پیچد تا منظم بسته‌بندی شود."}}, {"term": "Identify this chromosome structure", "def": "A duplicated chromosome: two identical sister chromatids joined at the centromere, with telomeres at the tips.", "timg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 200 170\">\n<path d=\"M70 18 Q55 18 55 45 L55 78 Q55 85 62 85 Q55 85 55 92 L55 125 Q55 152 70 152\" fill=\"none\" stroke=\"#1f6f54\" stroke-width=\"13\" stroke-linecap=\"round\"/>\n<path d=\"M100 18 Q115 18 115 45 L115 78 Q115 85 108 85 Q115 85 115 92 L115 125 Q115 152 100 152\" fill=\"none\" stroke=\"#4f8a59\" stroke-width=\"13\" stroke-linecap=\"round\"/>\n<circle cx=\"85\" cy=\"85\" r=\"9\" fill=\"#cf8233\"/>\n<line x1=\"150\" y1=\"85\" x2=\"120\" y2=\"85\" stroke=\"#19251f\" stroke-width=\"1.5\"/><text x=\"153\" y=\"89\" font-family=\"Inter,sans-serif\" font-size=\"12\" fill=\"#19251f\">centromere<\/text>\n<line x1=\"150\" y1=\"30\" x2=\"92\" y2=\"24\" stroke=\"#19251f\" stroke-width=\"1.5\"/><text x=\"153\" y=\"34\" font-family=\"Inter,sans-serif\" font-size=\"12\" fill=\"#19251f\">telomere<\/text>\n<line x1=\"20\" y1=\"60\" x2=\"56\" y2=\"60\" stroke=\"#19251f\" stroke-width=\"1.5\"/><text x=\"2\" y=\"50\" font-family=\"Inter,sans-serif\" font-size=\"12\" fill=\"#19251f\">sister<\/text><text x=\"2\" y=\"64\" font-family=\"Inter,sans-serif\" font-size=\"12\" fill=\"#19251f\">chromatids<\/text>\n<\/svg>", "cid": "chromosomes-genes-alleles-7a-03", "simple": "A copied chromosome: two identical halves (sister chromatids) joined in the middle (centromere), with caps on the ends (telomeres).", "tr": {"ar": "كروموسوم منسوخ: نصفان متطابقان (كروماتيدان شقيقان) متّصلان في الوسط (السنترومير)، مع أغطية على الأطراف (التيلوميرات).", "tr": "Kopyalanmış bir kromozom: ortada (sentromer) birleşen iki özdeş yarı (kardeş kromatitler) ve uçlarda kapaklar (telomerler).", "vi": "Một nhiễm sắc thể đã nhân đôi: hai nửa giống hệt (nhiễm sắc tử chị em) nối ở giữa (tâm động), có mũ ở hai đầu (telomere).", "prs": "یک کروموزوم کپی‌شده: دو نیمهٔ همسان (کروماتیدهای خواهر) که در وسط (سانترومر) به هم وصل‌اند و در دو سر کلاهک دارند (تلومرها)."}}, {"term": "Sister chromatids", "def": "Two identical copies of a chromosome joined at the centromere, produced by DNA replication.", "cid": "chromosomes-genes-alleles-7a-04", "simple": "Two identical copies of a chromosome, joined in the middle.", "tr": {"ar": "نسختان متطابقتان من كروموسوم، متّصلتان في الوسط.", "tr": "Bir kromozomun ortada birleşmiş iki özdeş kopyası.", "vi": "Hai bản sao giống hệt của một nhiễm sắc thể, nối với nhau ở giữa.", "prs": "دو نسخهٔ همسان از یک کروموزوم که در وسط به هم وصل‌اند."}}, {"term": "Centromere", "def": "The region that joins sister chromatids together and acts as the attachment point for spindle fibres.", "cid": "chromosomes-genes-alleles-7a-05", "simple": "The middle point that joins the two halves of a chromosome. Fibres attach here.", "parts": [{"p": "centro", "m": "centre"}, {"p": "mere", "m": "part"}], "syll": "Cen·tro·mere", "tr": {"ar": "النقطة الوسطى التي تربط نصفي الكروموسوم. تتّصل الألياف هنا.", "tr": "Bir kromozomun iki yarısını birleştiren orta nokta. Lifler buraya bağlanır.", "vi": "Điểm ở giữa nối hai nửa của nhiễm sắc thể. Các sợi tơ bám vào đây.", "prs": "نقطهٔ میانی که دو نیمهٔ کروموزوم را به هم وصل می‌کند. رشته‌ها به اینجا می‌چسبند."}}, {"term": "Telomeres", "def": "Protective, repetitive DNA sequences at the ends of a chromosome.", "cid": "chromosomes-genes-alleles-7a-06", "simple": "Protective caps on the ends of a chromosome.", "parts": [{"p": "telo", "m": "end"}, {"p": "mere", "m": "part"}], "syll": "Te·lo·meres", "tr": {"ar": "أغطية واقية على أطراف الكروموسوم.", "tr": "Kromozomun uçlarındaki koruyucu kapaklar.", "vi": "Các mũ bảo vệ ở hai đầu nhiễm sắc thể.", "prs": "کلاهک‌های محافظ در دو سر کروموزوم."}}, {"term": "Homologous chromosomes", "def": "A matching pair of chromosomes (one maternal, one paternal) carrying the same genes in the same order, though possibly different alleles.", "cid": "chromosomes-genes-alleles-7a-07", "simple": "A pair of chromosomes, one from each parent, with the same genes in the same order.", "parts": [{"p": "homo", "m": "same"}, {"p": "logous", "m": "matching"}], "tr": {"ar": "زوج من الكروموسومات، واحد من كل والد، يحملان الجينات نفسها بالترتيب نفسه.", "tr": "Her ebeveynden bir tane gelen, aynı genleri aynı sırada taşıyan bir kromozom çifti.", "vi": "Một cặp nhiễm sắc thể, mỗi cái từ một bố hoặc mẹ, có cùng các gen theo cùng thứ tự.", "prs": "یک جفت کروموزوم، یکی از هر والد، با ژن‌های یکسان به همان ترتیب."}}, {"term": "Sister chromatids vs homologous chromosomes", "def": "Sister chromatids are identical copies of one chromosome; homologous chromosomes are a pair carrying the same genes but possibly different alleles.", "cid": "chromosomes-genes-alleles-7a-08", "simple": "Sister chromatids are exact copies of one chromosome. Homologous ones are a pair with the same genes but maybe different versions.", "tr": {"ar": "الكروماتيدان الشقيقان نسختان طبق الأصل من كروموسوم واحد. أمّا المتماثلان فهما زوج يحمل الجينات نفسها لكن ربّما بنسخ مختلفة.", "tr": "Kardeş kromatitler bir kromozomun birebir kopyalarıdır. Homolog olanlar ise aynı genleri taşıyan ama belki farklı sürümleri olan bir çifttir.", "vi": "Nhiễm sắc tử chị em là bản sao y hệt của một nhiễm sắc thể. Cặp tương đồng có cùng gen nhưng có thể khác phiên bản.", "prs": "کروماتیدهای خواهر نسخه‌های دقیق یک کروموزوم‌اند. اما کروموزوم‌های همتا یک جفت‌اند با ژن‌های یکسان ولی شاید نسخه‌های متفاوت."}}, {"term": "Locus", "def": "The specific position of a gene on a chromosome.", "cid": "chromosomes-genes-alleles-7a-09", "simple": "The exact place where a gene sits on a chromosome.", "syll": "Lo·cus", "tr": {"ar": "الموضع الدقيق الذي يقع فيه الجين على الكروموسوم.", "tr": "Bir genin kromozom üzerinde bulunduğu kesin yer.", "vi": "Vị trí chính xác của một gen trên nhiễm sắc thể.", "prs": "جای دقیق یک ژن روی کروموزوم."}}, {"term": "Allele", "def": "A different version (variant) of a gene.", "cid": "chromosomes-genes-alleles-7a-10", "simple": "A different version of a gene.", "parts": [{"p": "allele", "m": "an 'other' version (from Greek allos = other)"}], "syll": "Al·lele", "tr": {"ar": "نسخة مختلفة من الجين.", "tr": "Bir genin farklı bir sürümü.", "vi": "Một phiên bản khác của một gen.", "prs": "نسخه‌ای متفاوت از یک ژن."}}, {"term": "Genome", "def": "The complete set of genetic material (all the DNA) of an organism.", "cid": "chromosomes-genes-alleles-7a-11", "simple": "All of an organism's DNA.", "parts": [{"p": "gen", "m": "gene"}, {"p": "ome", "m": "whole set"}], "syll": "Ge·nome", "tr": {"ar": "كامل الحمض النووي للكائن الحي.", "tr": "Bir organizmanın tüm DNA'sı.", "vi": "Toàn bộ DNA của một sinh vật.", "prs": "تمام DNA یک موجود زنده."}}, {"term": "Diploid (2n)", "def": "A cell with two copies of each chromosome, one from each parent (human body cells have 46).", "cid": "chromosomes-genes-alleles-7a-12", "simple": "A cell with two of each chromosome, one from each parent. Human body cells have 46.", "parts": [{"p": "di", "m": "two"}, {"p": "ploid", "m": "set"}], "syll": "Di·ploid", "tr": {"ar": "خلية بها نسختان من كل كروموسوم، واحدة من كل والد. خلايا جسم الإنسان بها 46.", "tr": "Her kromozomdan ikişer tane bulunan, her ebeveynden biri gelen bir hücre. İnsan vücut hücrelerinde 46 tane vardır.", "vi": "Tế bào có hai bản của mỗi nhiễm sắc thể, mỗi bản từ một bố hoặc mẹ. Tế bào cơ thể người có 46.", "prs": "سلولی که از هر کروموزوم دو نسخه دارد، یکی از هر والد. سلول‌های بدن انسان ۴۶ کروموزوم دارند."}}, {"term": "Haploid (n)", "def": "A cell with one copy of each chromosome (human gametes have 23).", "cid": "chromosomes-genes-alleles-7a-13", "simple": "A cell with one of each chromosome. Human egg and sperm have 23.", "parts": [{"p": "haplo", "m": "single"}, {"p": "ploid", "m": "set"}], "syll": "Hap·loid", "tr": {"ar": "خلية بها نسخة واحدة من كل كروموسوم. بويضة الإنسان والحيوان المنوي بهما 23.", "tr": "Her kromozomdan birer tane bulunan bir hücre. İnsan yumurtası ve spermi 23 tane taşır.", "vi": "Tế bào có một bản của mỗi nhiễm sắc thể. Trứng và tinh trùng người có 23.", "prs": "سلولی که از هر کروموزوم یک نسخه دارد. تخمک و اسپرم انسان ۲۳ کروموزوم دارند."}}, {"term": "Karyotype", "def": "An ordered image of all of an organism's chromosomes, arranged by size and shape.", "cid": "chromosomes-genes-alleles-7a-14", "simple": "A sorted picture of all an organism's chromosomes, lined up by size.", "parts": [{"p": "karyo", "m": "nucleus"}, {"p": "type", "m": "picture / kind"}], "syll": "Kar·y·o·type", "tr": {"ar": "صورة مرتّبة لجميع كروموسومات الكائن، مصفوفة حسب الحجم.", "tr": "Bir organizmanın tüm kromozomlarının boyuta göre dizilmiş düzenli bir görüntüsü.", "vi": "Hình ảnh sắp xếp tất cả nhiễm sắc thể của một sinh vật, xếp theo kích thước.", "prs": "تصویری مرتب از همهٔ کروموزوم‌های یک موجود که بر اساس اندازه ردیف شده‌اند."}}, {"term": "Human karyotype", "def": "46 chromosomes arranged as 23 pairs: 22 pairs of autosomes plus one pair of sex chromosomes.", "cid": "chromosomes-genes-alleles-7a-15", "simple": "46 chromosomes in 23 pairs: 22 normal pairs and 1 sex pair.", "tr": {"ar": "46 كروموسومًا في 23 زوجًا: 22 زوجًا عاديًّا وزوج جنسي واحد.", "tr": "23 çift hâlinde 46 kromozom: 22 normal çift ve 1 cinsiyet ç قسام الخلوي العادي.", "tr": "İkinci bölünme. Normal hücre bölünmesi gibi kopyaları ayırır.", "vi": "Lần phân chia thứ hai. Nó tách các bản sao, giống như phân bào thường.", "prs": "تقسیم دوم. نسخه‌ها را جدا می‌کند، مانند تقسیم سلولی معمولی."}}, {"term": "Prophase I", "def": "Chromosomes condense, homologous pairs come together (synapsis) and crossing over occurs.", "cid": "meiosis-gamete-formation-7b-05", "simple": "Early meiosis: chromosomes thicken, pairs come together, and they swap pieces (crossing over).", "parts": [{"p": "pro", "m": "before"}, {"p": "phase", "m": "stage"}], "tr": {"ar": "بداية الانقسام المنصّف: تتكثّف الكروموسومات، وتتقارب الأزواج، وتتبادل القطع (العبور).", "tr": "Mayozun başı: kromozomlar kalınlaşır, çiftler bir araya gelir ve parça değiş tokuş eder (krossing over).", "vi": "Đầu giảm phân: nhiễm sắc thể dày lên, các cặp ghép lại và trao đổi đoạn (trao đổi chéo).", "prs": "آغاز میوز: کروموزوم‌ها ضخیم می‌شوند، جفت‌ها کنار هم می‌آیند و قطعه‌ها را مبادله می‌کنند (کراسینگ‌اور)."}}, {"term": "Metaphase I", "def": "Homologous pairs line up along the cell's equator, oriented randomly (independent assortment).", "cid": "meiosis-gamete-formation-7b-06", "simple": "Chromosome pairs line up in the middle in random order.", "parts": [{"p": "meta", "m": "across / middle"}, {"p": "phase", "m": "stage"}], "tr": {"ar": "تصطفّ أزواج الكروموسومات في الوسط بترتيب عشوائي.", "tr": "Kromozom çiftleri ortada rastgele bir sırayla dizilir.", "vi": "Các cặp nhiễm sắc thể xếp hàng ở giữa theo thứ tự ngẫu nhiên.", "prs": "جفت‌های کروموزوم در وسط به ترتیب تصادفی ردیف می‌شوند."}}, {"term": "Anaphase I", "def": "Homologous chromosomes are pulled to opposite poles of the cell.", "cid": "meiosis-gamete-formation-7b-07", "simple": "The chromosome pairs are pulled apart to opposite ends.", "parts": [{"p": "ana", "m": "apart / up"}, {"p": "phase", "m": "stage"}], "tr": {"ar": "تُسحب أزواج الكروموسومات إلى الطرفين المتقابلين.", "tr": "Kromozom çiftleri zıt uçlara çekilir.", "vi":  hợp khi thụ tinh.", "prs": "سلول‌های جنسی (تخمک و اسپرم) که هنگام لقاح به هم می‌پیوندند."}}, {"term": "Number of cells from meiosis", "def": "One diploid cell produces four haploid daughter cells.", "cid": "meiosis-gamete-formation-7b-11", "simple": "One cell makes four cells.", "tr": {"ar": "خلية واحدة تُنتج أربع خلايا.", "tr": "Bir hücre dört hücre oluşturur.", "vi": "Một tế bào tạo ra bốn tế bào.", "prs": "یک سلول چهار سلول می‌سازد."}}, {"term": "Timing of meiosis in males", "def": "Sperm are produced continuously from puberty onwards.", "cid": "meiosis-gamete-formation-7b-12", "simple": "Sperm are made non-stop from puberty.", "tr": {"ar": "تُنتَج الحيوانات المنوية باستمرار منذ البلوغ.", "tr": "Sperm ergenlikten itibaren sürekli üretilir.", "vi": "Tinh trùng được tạo ra liên tục từ tuổi dậy thì.", "prs": "اسپرم از بلوغ به بعد به‌طور پیوسته ساخته می‌شود."}}, {"term": "Timing of meiosis in females", "def": "Egg production begins before birth, pauses, and is completed one egg at a time from puberty.", "cid": "meiosis-gamete-formation-7b-13", "simple": "Eggs start before birth, then pause, and finish one at a time from puberty.", "tr": {"ar": "تبدأ البويضات قبل الولادة، ثم تتوقّف، وتكتمل واحدة تلو الأخرى منذ البلوغ.", "tr": "Yumurtalar doğumdan önce başlar, duraklar ve ergenlikten itibaren teker teker tamamlanır.", "vi": "Trứng bắt đầu trước khi sinh, rồi tạm dừng, và hoàn thành từng cái một từ tuổi dậy thì.", "prs": "تخمک‌ها پیش از تولد آغاز می‌شوند، سپس متوقف می‌مانند و از بلوغ یکی‌یکی کامل می‌شوند."}}], "chapter": "7B", "order": 1, "sid": "meiosis-gamete-formation-7b"}, {"name": "Genotype & Phenotype (7C)", "cards": [{"term": "Genotype", "def": "The genetic makeup — the combination of alleles an organism carries for a trait.", "cid": "genotype-phenotype-7c-01", "simple": "The set of alleles (gene versions) an organism has for a trait.", "parts": [{"p": "geno", "m": "gene / origin"}, {"p": "type", "m": "kind"}], "syll": "Gen·o·type", "tr": {"ar": "مجموعة الأليلات (نسخ الجين) التي يحملها الكائن لصفة ما.", "tr": "Bir organizmanın bir özellik için sahip olduğu alel (gen sürümleri) takımı.", "vi": "Tập hợp các alen (phiên bản gen) mà một sinh vật có cho một tính trạng.", "prs": "مجموعهٔ اَلِل‌ها (نسخه‌های ژن) که یک موجود برای یک صفت دارد."}}, {"term": "Phenotype", "def": "The observable physical or biochemical characteristics of an organism, resulting from genotype and environment.", "cid": "genotype-phenotype-7c-02", "simple": "The traits you can see or measure, set by genes and surroundings.", "parts": [{"p": "pheno", "m": "to show / appear"}, {"p": "type", "m": "kind"}], "syll": "Phe·no·type", "tr": {"ar": "الصفات التي يمكن رؤيتها أو قياسها، وتحدّدها الجينات والبيئة.", "tr": "Genler ve çevre tarafından belirlenen, görülebilen veya ölçülebilen özellikler.", "vi": "Những tính trạng có thể thấy hoặc đo được, do gen và môi trường quyết định.", "prs": "صفت‌هایی که می‌توان دید یا اندازه گرفت و ژن‌ها و محیط آن‌ها را تعیین می‌کنند."}}, {"term": "How genotype influences phenotype", "def": "The alleles in the genotype are instructions to make proteins; those proteins build the structures or carry out the reactions that produce the observable trait.", "cid": "genotype-phenotype-7c-03", "simple": "Genes are used to make proteins, and those proteins build the trait you see.", "tr": {"ar": "تُستخدَم الجينات لصنع البروتينات، وهذه البروتينات تبني الصفة التي تراها.", "tr": "Genler protein yapmak için kullanılır ve bu proteinler gördüğün özelliği oluşturur.", "vi": "Gen được dùng để tạo protein, và các protein đó tạo nên tính trạng bạn thấy.", "prs": "ژن‌ها برای ساختن پروتئین به کار می‌روند و این پروتئین‌ها صفتی را که می‌بینی می‌سازند."}}, {"term": "Dominant allele", "def": "An allele that is expressed in the phenotype whenever at least one copy is present; shown with a capital letter.", "cid": "genotype-phenotype-7c-04", "simple": "An allele that shows up even with only one copy. Written as a capital letter.", "tr": {"ar": "أليل يظهر حتى مع وجود نسخة واحدة. يُكتب بحرف كبير.", "tr": "Tek bir kopyayla bile ortaya çıkan alel. Büyük harfle yazılır.", "vi": "Alen trội biểu hiện ngay cả khi chỉ có một bản. Viết bằng chữ in hoa.", "prs": "اَلِلی که حتی با یک نسخه هم ظاهر می‌شود. با حرف بزرگ نوشته می‌شود."}}, {"term": "Recessive allele", "def": "An allele expressed only when two copies are present (homozygous); shown with a lowercase letter.", "cid": "genotype-phenotype-7c-05", "simple": "An allele that only shows up with two copies. Written as a small letter.", "tr": {"ar": "أليل لا يظهر إلا مع وجود نسختين. يُكتب بحرف صغير.", "tr": "Yalnızca iki kopyayla ortaya çıkan alel. Küçük harfle yazılır.", "vi": "Alen lặn chỉ biểu hiện khi có hai bản. Viết bằng chữ thường.", "prs": "اَلِلی که فقط با دو نسخه ظاهر می‌شود. با حرف کوچک نوشته می‌شود."}}, {"term": "Homozygous", "def": "Having two identical alleles for a gene (e.g. AA or aa).", "cid": "genotype-phenotype-7c-06", "simple": "Two of the same allele (like AA or aa).", "parts": [{"p": "homo", "m": "same"}, {"p": "zygous", "m": "joined"}], "syll": "Ho·mo·zy·gous", "tr": {"ar": "أليلان متماثلان (مثل AA أو aa).", "tr": "Aynı iki alel (AA veya aa gibi).", "vi": "Hai alen giống nhau (như AA hoặc aa).", "prs": "دو اَلِل یکسان (مانند AA یا aa)."}}, {"term": "Heterozygous", "def": "Having two different alleles for a gene (e.g. Aa).", "cid": "genotype-phenotype-7c-07", "simple": "Two different alleles (like Aa).", "parts": [{"p": "hetero", "m": "different"}, {"p": "zygous", "m": "joined"}], "syll": "He·te·ro·zy·gous", "tr": {"ar": "أليلان مختلفان (مثل Aa).", "tr": "İki farklı alel (Aa gibi).", "vi": "Hai alen khác nhau (như Aa).", "prs": "دو اَلِل متفاوت (مانند Aa)."}}, {"term": "Carrier", "def": "A heterozygous individual who carries a recessive allele but does not show the trait.", "cid": "genotype-phenotype-7c-08", "simple": "Someone with one recessive allele who doesn't show the trait but can pass it on.", "syll": "Car·ri·er", "tr": {"ar": "شخص يحمل أليلًا متنحّيًا واحدًا ولا تظهر عليه الصفة لكنه قد ينقلها.", "tr": "Tek bir çekinik alel taşıyan, özelliği göstermeyen ama aktarabilen kişi.", "vi": "Người mang một alen lặn, không biểu hiện tính trạng nhưng có thể truyền lại.", "prs": "کسی که یک اَلِل مغلوب دارد و صفت را نشان نمی‌دهد اما می‌تواند آن را منتقل کند."}}, {"term": "Phenotype equation", "def": "Phenotype = genotype + environment.", "cid": "genotype-phenotype-7c-09", "simple": "What you see = your genes + your surroundings.", "tr": {"ar": "ما تراه = جيناتك + بيئتك.", "tr": "Gördüğün = genlerin + çevren.", "vi": "Cái bạn thấy = gen của bạn + môi trường của bạn.", "prs": "آنچه می‌بینی = ژن‌هایت + محیطت."}}], "chapter": "7C", "order": 1, "sid": "genotype-phenotype-7c"}, {"name": "Codominance & Incomplete Dominance (7C)", "cards": [{"term": "Incomplete dominance", "def": "An inheritance pattern where the heterozygote shows a blended, intermediate phenotype between the two homozygotes.", "cid": "codominance-incomplete-domin-01", "simple": "The heterozygote is a blend (a mix) of the two parents.", "tr": {"ar": "يكون الفرد الخليط مزيجًا (خلطًا) بين الوالدين.", "tr": "Heterozigot, iki ebeveynin bir karışımıdır.", "vi": "Thể dị hợp là sự pha trộn giữa hai bố mẹ.", "prs": "هتروزیگوت آمیزه‌ای (ترکیبی) از دو والد است."}}, {"term": "Incomplete dominance example", "def": "Red × white snapdragons produce pink-flowered heterozygotes (the colours blend).", "cid": "codominance-incomplete-domin-02", "simple": "Red + white flowers make pink flowers.", "tr": {"ar": "زهور حمراء + بيضاء تُنتج زهورًا وردية.", "tr": "Kırmızı + beyaz çiçekler pembe çiçek verir.", "vi": "Hoa đỏ + hoa trắng tạo ra hoa hồng.", "prs": "گل‌های قرمز + سفید گل‌های صورتی می‌دهند."}, "timg": "data:image/webp;base64,UklGRvZWAABXRUJQVlA4IOpWAABwWQGdASo0A1gCPm02mEikIyKhJBPoyIANiWdu/HRZ4sS+3LQfb/5W/adszQvsT83/fv3Q9sLnPyi90eQfY31j9g+cz5l+6/Np9Gv956kf8f/q//P7gf+S/tPrz9C3mC/cH9rvdZ/1f7n+5n+jf6X2AP5j/nP//7V//A///uJ/4X/q////2fAR+5v////HvIf/L95/hQ/wP/q/efsAP//7Zn8A///W/9Kv69+R3vn73fs3 ông pha trộn.", "prs": "هر دو اَلِل هم‌زمان به‌طور کامل ظاهر می‌شوند، بدون آمیختن."}}, {"term": "Codominance example", "def": "Blood group AB expresses both A and B antigens; roan cattle show both red and white hairs together.", "cid": "codominance-incomplete-domin-04", "simple": "Blood type AB shows both A and B. Roan cattle show red and white hairs together.", "tr": {"ar": "فصيلة الدم AB تُظهر A وB معًا. أبقار الرّون تُظهر شعرًا أحمر وأبيض معًا.", "tr": "AB kan grubu hem A hem B gösterir. Demir kırı sığırlar kırmızı ve beyaz kılları birlikte gösterir.", "vi": "Nhóm máu AB biểu hiện cả A và B. Bò lông lang có lông đỏ và trắng cùng nhau.", "prs": "گروه خونی AB هم A و هم B را نشان می‌دهد. گاوهای کهر موهای قرمز و سفید را با هم دارند."}}, {"term": "Phenotypic ratio for incomplete dominance", "def": "A heterozygous cross gives a 1:2:1 phenotype ratio — the phenotype ratio matches the genotype ratio because the heterozygote looks different from both homozygotes.", "cid": "codominance-incomplete-domin-05", "simple": "A cross of two blends gives 1:2:1 — the look matches the genotype counts.", "tr": {"ar": "تزاوج خليطين يعطي نسبة 1:2:1 — يطابق المظهرُ أعدادَ الطُّرز الوراثية.", "tr": "İki melezin çaprazı 1:2:1 oranı verir — görünüm, genotip sayılarıyla eşleşir.", "vi": "Lai hai thể pha trộn cho tỉ lệ 1:2:1 — kiểu hình khớp với số kiểu gen.", "prs": "آمیزش دو هتروزیگوت نسبت ۱:۲:۱ می‌دهد — ظاهر با شمار ژنوتیپ‌ها هم‌خوان است."}}, {"term": "Writing codominant / incomplete-dominance alleles", "def": "A shared capital letter with a superscript for each version, e.g. Cᴿ (red) and Cᵂ (white) — not capital vs lowercase, because neither allele is simply dominant.", "cid": "codominance-incomplete-domin-06", "simple": "Use one capital letter with small raised labels (like Cᴿ, Cᵂ), because neither version simply wins.", "tr": {"ar": "استخدم حرفًا كبيرًا واحدًا مع رموز صغيرة مرفوعة (مثل Cᴿ، Cᵂ)، لأن أيًّا من النسختين لا يَغلب ببساطة.", "tr": "Tek bir büyük harfi küçük üst simgelerle kullan (Cᴿ, Cᵂ gibi), çünkü hiçbir sürüm diğerine basitçe baskın gelmez.", "vi": "Dùng một chữ in hoa với các ký hiệu nhỏ phía trên (như Cᴿ, Cᵂ), vì không phiên bản nào đơn giản lấn át.", "prs": "یک حرف بزرگ با نشانه‌های کوچک بالا به کار ببر (مانند Cᴿ، Cᵂ)، چون هیچ‌کدام به‌سادگی غالب نمی‌شود."}}], "chapter": "7C", "order": 2, "sid": "codominance-incomplete-domin"}, {"name": "Sex-linked Inheritance (7C)", "cards": [{"term": "Sex-linked gene", "def": "A gene carried on a sex chromosome — in practice almost always the X chromosome, as the Y carries very few genes.", "cid": "sex-linked-inheritance-7c-01", "simple": "A gene on a sex chromosome, almost always the X.", "tr": {"ar": "جين على كروموسوم جنسي، وغالبًا على X تقريبًا دائمًا.", "tr": "Cinsiyet kromozomunda, neredeyse her zaman X üzerinde bulunan bir gen.", "vi": "Một gen trên nhiễm sắc thể giới tính, hầu như luôn trên X.", "prs": "ژنی روی کروموزوم جنسی، تقریباً همیشه روی X."}}, {"term": "X-linked recessive trait", "def": "A trait caused by a recessive allele carried on the X chromosome.", "cid": "sex-linked-inheritance-7c-02", "simple": "A trait from a recessive allele on the X chromosome.", "tr": {"ar": "صفة ناتجة عن أليل متنحٍّ على كروموسوم X.", "tr": "X kromozomundaki çekinik bir alelden kaynaklanan özellik.", "vi": "Tính trạng do một alen lặn trên nhiễm sắc thể X.", "prs": "صفتی که از یک اَلِل مغلوب روی کروموزوم X پدید می‌آید."}}, {"term": "Why X-linked recessive traits are more common in males", "def": "A male has only one X chromosome (XY), so a single recessive allele on it is enough to show the trait. A female (XX) would need two copies.", "cid": "sex-linked-inheritance-7c-03", "simple": "Males have only one X, so one recessive allele is enough to show. Females need two.", "tr": {"ar": "للذكور كروموسوم X واحد فقط، فيكفي أليل متنحٍّ واحد لظهور الصفة. أما الإناث فتحتاج إلى نسختين.", "tr": "Erkeklerde yalnızca bir X vardır, bu yüzden tek bir çekinik alel yeterlidir. Kadınların iki tane gerekir.", "vi": "Nam chỉ có một X, nên một alen lặn là đủ để biểu hiện. Nữ cần hai.", "prs": "مردان فقط یک X دارند، پس یک اَلِل مغلوب کافی است. زنان به دو نسخه نیاز دارند."}}, {"term": "Carrier female (X-linked)", "def": "A heterozygous female (Xᴬ Xᵃ) who carries the recessive allele but does not show the trait, because her other X carries the dominant allele.", "cid": "sex-linked-inheritance-7c-04", "simple": "A female with one copy (Xᴬ Xᵃ). She carries it but does not show it.", "tr": {"ar": "أنثى تحمل نسخة واحدة (Xᴬ Xᵃ). تحملها لكن لا تظهر عليها.", "tr": "Tek kopya taşıyan bir kadın (Xᴬ Xᵃ). Taşır ama göstermez.", "vi": "Người nữ mang một bản (Xᴬ Xᵃ). Cô ấy mang nhưng không biểu hiện.", "prs": "زنی که یک نسخه دارد (Xᴬ Xᵃ). آن را حمل می‌کند اما نشان نمی‌دهد."}}, {"term": "Affected male genotype (X-linked recessive)", "def": "Xᵃ Y — the single recessive allele on his only X chromosome is expressed.", "cid": "sex-linked-inheritance-7c-05", "simple": "Xᵃ Y — his one X has the recessive allele, so he shows the trait.", "tr": {"ar": "Xᵃ Y — كروموسوم X الوحيد لديه يحمل الأليل المتنحّي، فتظهر عليه الصفة.", "tr": "Xᵃ Y — tek X'i çekinik aleli taşır, bu yüzden özelliği gösterir.", "vi": "Xᵃ Y — chiếc X duy nhất của anh ấy mang alen lặn, nên anh ấy biểu hiện tính trạng.", "prs": "Xᵃ Y — تنها X او اَلِل مغلوب را دارد، پس صفت را نشان می‌دهد."}}, {"term": "X-linked disorder examples", "def": "Red-green colour blindness and haemophilia.", "cid": "sex-linked-inheritance-7c-06", "simple": "Red-green colour blindness and haemophilia.", "tr": {"ar": "عمى الألوان الأحمر-الأخضر والهيموفيليا (نزف الدم).", "tr": "Kırmızı-yeşil renk körlüğü ve hemofili.", "vi": "Mù màu đỏ-lục và bệnh máu khó đông.", "prs": "کوررنگی قرمز-سبز و هموفیلی."}}, {"term": "Carrier mother × unaffected father", "def": "Cross Xᴬ Xᵃ × Xᴬ Y: on average half the sons are affected, while daughters are unaffected but half are carriers.", "cid": "sex-linked-inheritance-7c-07", "simple": "About half the sons show the trait. Daughters don't, but half carry it.", "tr": {"ar": "نحو نصف الأبناء الذكور تظهر عليهم الصفة. البنات لا تظهر عليهنّ، لكن نصفهنّ حاملات.", "tr": "Oğulların yaklaşık yarısı özelliği gösterir. Kızlar göstermez ama yarısı taşıyıcıdır.", "vi": "Khoảng một nửa con trai biểu hiện tính trạng. Con gái thì không, nhưng một nửa là người mang.", "prs": "حدود نیمی از پسران صفت را نشان می‌دهند. دختران نشان نمی‌دهند، اما نیمی از آن‌ها ناقل‌اند."}, "timg": "data:image/webp;base64,UklGRjpNAABXRUJQVlA4IC5NAABwTQGdASr4AvgCPm02mEkkIyKhIfTo8IANiWdu/HyZyOmZm6WK0fjf8z+9+jH1vjuP4HTR2r5NvRvo0/3XqL/1H+k9gD/J+nT0G/9j0BfuR6tH+5/cf/2/Bf+o/7r2Bv6J/svVn/5n///6fwF/2f/qf///p/AH+7PrR//H94PhI/yP/o9hz/B/9H//+wB//vbi/gH//61/o3/PvyN97Hd59T/sP9u/wX9p/Yn2j/G/lP71/a/2z/tHst/6XhJ8//fP9f/efUb+OfXf8V/aP3W/u/zW/VP87/hPGH35f5H+F/bz4Bfx7+Xf47+x/t//ifjP9u/w/2y+LFov9t/xP+S9gL2P+ef6n/Afup/n/RY/w/7n6h/k/9i/3f+S+AD+V/0z/k/371z/2H7H+Tf9u/2/66/AF/Qf8J/8f9J+W/0r/yX/a/y3+z/aj2p/ov+U/8f+j+Aj+a/2H/rf4n/MftL88X/////wY/eP///+f4bf3d//4b2DjjU4aOpOTuiHUnJ3RDqTk7oh1Jyd0Qttk4CGf45mtFHndiHUnIrRtp3coo6ZP756SlLunPYVyVDN91kxS+JT9yPke9FPc83/lcSLoUP/tgZJ/WQCjF2gxMugvXs6DpA52C4HERJauEMwPxZjX8QGuE3LDcV3cX1fmYA+QaRrev7QACsRRatvqlAEMcTuiHUnO08h1JydzuLNH6x3MyAIMsWaZGXPiO678Ch5xKREBXoHKSsL6gOSU8SgO80y4NObVgfaxrPE5YGIhXfaXKHw+DwoW2sSACpadogIy5XxLYhTYTGLp/8w2LpD5eQ8dTJzDpDqTk7oh1Jyd0Q6k8FguCBMjT3vslst0ua+G26XNfDbdLmn64KNqSkO4LrWjF91qb7m0wtBTYNYSTuTEAjR4zvzwvrETUdhZRARSiV7cNHUnJ3RDqSCzfdQbduoJ9Z+hPc7fIrFzEIh6HoJTcUB21I4X3xpeIbaQeXH0noOaK0XME/3UdEWOk3kRWSoKgsEzXPHgQw/Ojawh/NXqysIyRxN123JRG5expvXYx1fPfkz5niBLq2gd7WDTJPlT+f4Yqb/ngBfZEYuW7C/F+nXwX8ed7k+/iYjOIJFFIdScndEOpOXTGnoVtqyv3KtPMf9LvDelEtPRbVZSMtu16vFA4Jq7eljKNMHH5aNJzj5r4bbpc18NtPqeXNLmvhtulytDtTy7NRqIHzXw23S5r4bbpc13P5fhH2Yx//HbhmnMbgqPC5rvYZjFffunW+ECsNHUnJ3RDqTk7oh1JycUTwtLsB1tDUDtUX/JqLYDtiGoHlounfxyXNfDbdLmvhtulzXwwZQu0ibXNEpzVLRf8mnVUwnjtiU5qlov+TTohbsqc7sQ6k5O6IdScndELmE1qTkZXIbbpanRoqWnuxDqTk7oh1JydtzPdEOoEEPAgfKw1JdLmvhtulzXw23S5rwSTlE8YpyRE4OId/aNiassXJUNPGIE1chgBKUF28AAVH4FZ8RbvU/qcKYbOmRPdiHUnJ3RDqTk7 me animals' fur.", "tr": {"ar": "قد تغيّر البيئة الصفات — مثلًا تغيّر حموضة التربة لون زهور الكوبية؛ والبرد يُغمّق فراء بعض الحيوانات.", "tr": "Çevre özellikleri değiştirebilir — örneğin toprak ortancanın çiçek rengini değiştirir; soğuk bazı hayvanların kürkünü koyulaştırır.", "vi": "Môi trường có thể thay đổi tính trạng — ví dụ đất làm đổi màu hoa cẩm tú cầu; lạnh làm sẫm lông một số động vật.", "prs": "محیط می‌تواند صفت‌ها را تغییر دهد — مثلاً خاک رنگ گل ادریسی را عوض می‌کند؛ سرما خز برخی جانوران را تیره می‌کند."}}, {"term": "Epigenetics", "def": "Heritable changes in gene expression that do not change the underlying DNA base sequence.", "cid": "nature-nurture-epigenetics-7-03", "simple": "Changes that turn genes on or off without changing the DNA letters. They can be passed on.", "parts": [{"p": "epi", "m": "on top of"}, {"p": "genetics", "m": "genes"}], "syll": "Ep·i·ge·net·ics", "tr": {"ar": "تغيّرات تُشغّل الجينات أو تُطفئها دون تغيير حروف الحمض النووي. ويمكن أن تُورَّث.", "tr": "DNA harflerini değiştirmeden genleri açıp kapatan değişiklikler. Aktarılabilirler.", "vi": "Những thay đổi bật/tắt gen mà không đổi các chữ cái DNA. Chúng có thể di truyền.", "prs": "تغییراتی که ژن‌ها را روشن یا خاموش می‌کنند بدون تغییر حروف DNA. این تغییرها می‌توانند به ارث برسند."}}, {"term": "DNA methylation", "def": "The addition of methyl groups to DNA (often to cytosine), which usually switches a gene off or lowers its expression.", "cid": "nature-nurture-epigenetics-7-04", "simple": "Adding tiny methyl tags to DNA. This usually switches a gene off.", "parts": [{"p": "methyl", "m": "a small chemical tag"}, {"p": "ation", "m": "process of"}], "tr": {"ar": "إضافة وُسوم مثيل صغيرة إلى الحمض النووي. وهذا عادةً يُطفئ الجين.", "tr": "DNA'ya küçük metil etiketleri eklemek. Bu genellikle bir geni kapatır.", "vi": "Gắn các nhãn methyl nhỏ vào DNA. Điều này thường tắt một gen.", "prs": "افزودن برچسب‌های کوچک متیل به DNA. این کار معمولاً یک ژن را خاموش می‌کند."}}, {"term": "Are epigenetic changes reversible?", "def": "Yes — they can be added or removed and are influenced by environmental factors such as diet and stress.", "cid": "nature-nurture-epigenetics-7-05", "simple": "Yes. They can be added or removed, and things like diet and stress affect them.", "tr": {"ar": "نعم. يمكن إضافتها أو إزالتها، وتؤثّر فيها أمور مثل الغذاء والتوتّر.", "tr": "Evet. Eklenebilir veya çıkarılabilir; beslenme ve stres gibi şeyler onları etkiler.", "vi": "Có. Chúng có thể được thêm hoặc bỏ, và những thứ như chế độ ăn và căng thẳng ảnh hưởng đến chúng.", "prs": "بله. می‌توان آن‌ها را افزود یا برداشت، و چیزهایی مانند غذا و استرس بر آن‌ها اثر می‌گذارند."}}], "chapter": "7D", "order": 1, "sid": "nature-nurture-epigenetics-7"}, {"name": "Monohybrid Crosses & Mendel (7C/8A)", "cards": [{"term": "Monohybrid cross", "def": "A genetic cross that follows the inheritance of a single trait (one gene).", "cid": "monohybrid-crosses-mendel-7c-01", "simple": "A cross that follows just one trait (one gene).", "parts": [{"p": "mono", "m": "one"}, {"p": "hybrid", "m": "mix"}], "tr": {"ar": "تزاوج يتتبّع صفة واحدة فقط (جينًا واحدًا).", "tr": "Yalnızca tek bir özelliği (tek geni) izleyen bir çaprazlama.", "vi": "Phép lai chỉ theo dõi một tính trạng (một gen).", "prs": "آمیزشی که فقط یک صفت (یک ژن) را دنبال می‌کند."}}, {"term": "Mendel's law of segregation", "def": "The two alleles for a trait separate during gamete formation, so each gamete carries only one allele.", "cid": "monohybrid-crosses-mendel-7c-02", "simple": "The two alleles split up when sex cells form, so each cell gets one.", "tr": {"ar": "ينفصل الأليلان عند تكوّن الخلايا الجنسية، فتأخذ كل خلية واحدًا.", "tr": "İki alel, eşey hücreleri oluşurken ayrılır, böylece her hücre birini alır.", "vi": "Hai alen tách ra khi tế bào sinh dục hình thành, nên mỗi tế bào nhận một alen.", "prs": "هنگام ساخت سلول‌های جنسی، دو اَلِل جدا می‌شوند و هر سلول یکی را می‌گیرد."}}, {"term": "Mendel's law of independent assortment", "def": "Alleles of different genes are sorted into gametes independently of one another.", "cid": "monohybrid-crosses-mendel-7c-03", "simple": "Different genes are sorted into sex cells separately from each other.", "tr": {"ar": "تُوزَّع جينات مختلفة على الخلايا الجنسية بشكل مستقلّ بعضها عن بعض.", "tr": "Farklı genler, eşey hücrelerine birbirinden bağımsız olarak dağıtılır.", "vi": "Các gen khác nhau được phân vào tế bào sinh dục một cách độc lập với nhau.", "prs": "ژن‌های مختلف مستقل از یکدیگر به سلول‌های جنسی توزیع می‌شوند."}}, {"term": "Punnett square", "def": "A diagram used to predict the genotypes and phenotypes of offspring from a cross.", "cid": "monohybrid-crosses-mendel-7c-04", "simple": "A grid used to predict the offspring from a cross.", "tr": {"ar": "شبكة تُستخدَم للتنبّؤ بنسل التزاوج.", "tr": "Bir çaprazlamanın yavrularını tahmin etmek için kullanılan bir tablo.", "vi": "Một bảng dùng để dự đoán đời con từ một phép lai.", "prs": "جدولی که برای پیش‌بینی فرزندان یک آمیزش به کار می‌رود."}}, {"term": "Identify the cross and ratio shown", "def": "A heterozygous monohybrid cross (Aa × Aa): genotype ratio 1 AA : 2 Aa : 1 aa, giving a 3:1 dominant-to-recessive phenotype ratio.", "timg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 200 200\">\n<text x=\"60\" y=\"20\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"15\" font-weight=\"700\" fill=\"#19251f\">A<\/text>\n<text x=\"130\" y=\"20\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"15\" font-weight=\"700\" fill=\"#19251f\">a<\/text>\n<text x=\"18\" y=\"75\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"15\" font-weight=\"700\" fill=\"#19251f\">A<\/text>\n<text x=\"18\" y=\"145\" text-anchor=\"middle\" font-family=\"Inter,sans-serif\" font-size=\"15\" font-weight=\"700\" fill=\"#19251f\">a<\/text>\n<g stroke=\"#1f6f54\" stroke-width=\"2\" fill=\"none\">\n<rect x=\"30\" y=\"40\" width=\"70\" height=\"70\"/><rect x=\"100\" y=\"40\" width=\"70\" height=\"70 التالي.", "tr": "P = ebeveynler. F1 = onların çocukları. F2 = sonraki nesil.", "vi": "P = bố mẹ. F1 = con của họ. F2 = thế hệ tiếp theo.", "prs": "P = والدین. F1 = فرزندان آن‌ها. F2 = نسل بعدی."}}, {"term": "Phenotypic ratio of Aa × Aa", "def": "3:1 — three offspring showing the dominant trait to one showing the recessive trait.", "cid": "monohybrid-crosses-mendel-7c-07", "simple": "3:1 — three show the dominant trait, one shows the recessive.", "tr": {"ar": "3:1 — ثلاثة تظهر عليهم الصفة السائدة، وواحد تظهر عليه المتنحّية.", "tr": "3:1 — üçü baskın özelliği, biri çekinik özelliği gösterir.", "vi": "3:1 — ba cá thể biểu hiện tính trạng trội, một biểu hiện tính trạng lặn.", "prs": "۳:۱ — سه‌تا صفت غالب و یکی صفت مغلوب را نشان می‌دهند."}}, {"term": "Genotypic ratio of Aa × Aa", "def": "1:2:1 — one homozygous dominant : two heterozygous : one homozygous recessive.", "cid": "monohybrid-crosses-mendel-7c-08", "simple": "1:2:1 — one AA, two Aa, one aa.", "tr": {"ar": "1:2:1 — واحد AA، واثنان Aa، وواحد aa.", "tr": "1:2:1 — bir AA, iki Aa, bir aa.", "vi": "1:2:1 — một AA, hai Aa, một aa.", "prs": "۱:۲:۱ — یک AA، دو Aa، یک aa."}}, {"term": "Test cross", "def": "Crossing an individual of unknown genotype with a homozygous recessive individual to reveal the unknown genotype.", "cid": "monohybrid-crosses-mendel-7c-09", "simple": "Cross an unknown with a double-recessive to find out the unknown's alleles.", "tr": {"ar": "زاوج فردًا مجهول الطراز مع فرد متنحٍّ مزدوج لمعرفة أليلات المجهول.", "tr": "Bilinmeyen alelleri bulmak için bilinmeyen bireyi çift çekinikle çaprazla.", "vi": "Lai cá thể chưa biết với cá thể đồng hợp lặn để tìm ra alen của nó.", "prs": "برای یافتن اَلِل‌های فرد ناشناخته، او را با فرد مغلوب خالص آمیزش بده."}, "timg": "data:image/webp;base64,UklGRnxcAABXRUJQVlA4IHBcAACwbQGdASqEAxgCPm02l0ikIyKhI9IpsIANiWdu++gZinLG8QTfh7MWk/t+dn3jn8/9bs67V8xKC//Pfs57hv9l/q/YA/0/p39CHmH81T/W/ud/5fhF/Uv+F6TPqyf83///9L4Fv7Z/wf/7/0fgF/qH+5////P96H/4+yl/jP/l6xH/w9QD/++2z/AP/b1v/VD+gfjz5l
